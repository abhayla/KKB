<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Appearance</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .appearance-dialog {
      max-width: 300px;
    }
    .theme-options {
      display: flex;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-lg);
    }
    .theme-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-sm);
      padding: var(--sp-md) var(--sp-sm);
      border-radius: var(--radius-md);
      border: 2px solid var(--outline-variant);
      cursor: pointer;
      transition: all var(--transition-normal);
      background: transparent;
      text-align: center;
    }
    .theme-card:hover {
      background: var(--surface-warm);
      transform: translateY(-2px);
    }
    .theme-card.selected {
      border-color: var(--primary);
      background: var(--primary-container);
    }
    .theme-card-emoji {
      font-size: 32px;
      line-height: 1;
      transition: transform var(--transition-normal);
    }
    .theme-card.selected .theme-card-emoji {
      transform: scale(1.15);
      animation: warmPulse 2s ease-in-out infinite;
    }
    .theme-card-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .theme-card.selected .theme-card-label {
      color: var(--on-primary-container);
    }
    .theme-card-desc {
      font-size: 11px;
      color: var(--on-surface-variant);
      line-height: 1.3;
    }
    .theme-card.selected .theme-card-desc {
      color: var(--on-primary-container);
      opacity: 0.8;
    }
    .theme-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--on-primary);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      position: absolute;
      top: -6px;
      right: -6px;
      animation: bounceIn 0.3s ease-out;
    }
    .theme-card.selected .theme-check {
      display: flex;
    }
    .theme-card {
      position: relative;
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const app = document.getElementById('app');

    function renderPage() {
      const currentTheme = getState('dark_mode', 'light');
      app.innerHTML = `
        ${renderStatusBar()}

        <!-- Dimmed parent preview -->
        <div class="top-app-bar" style="opacity:0.3;">
          <a href="settings-main.html" class="nav-icon">&#8592;</a>
          <span class="title">Settings</span>
        </div>
        <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
          <div class="content-padding">
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
          </div>
        </div>

        <!-- Dialog Overlay -->
        <div class="dialog-overlay">
          <div class="dialog appearance-dialog">
            <div class="dialog-title" style="text-align:center;">Appearance</div>
            <p class="body-small" style="color:var(--on-surface-variant);text-align:center;margin-bottom:var(--sp-lg);">Choose your preferred theme</p>

            <!-- Theme Options as Visual Cards -->
            <div class="theme-options">
              ${[
                { id: 'light', emoji: '&#9728;&#65039;', label: 'Light', desc: 'Bright & warm' },
                { id: 'dark', emoji: '&#127769;', label: 'Dark', desc: 'Easy on eyes' },
                { id: 'system', emoji: '&#128241;', label: 'System', desc: 'Match device' }
              ].map(opt => `
                <div class="theme-card ${currentTheme === opt.id ? 'selected' : ''}" onclick="setTheme('${opt.id}');renderPage();">
                  <div class="theme-check">&#10003;</div>
                  <div class="theme-card-emoji">${opt.emoji}</div>
                  <div class="theme-card-label">${opt.label}</div>
                  <div class="theme-card-desc">${opt.desc}</div>
                </div>
              `).join('')}
            </div>

            <div class="dialog-actions" style="justify-content:center;">
              <a href="settings-main.html" class="btn btn-filled" style="text-decoration:none;min-width:120px;">Done</a>
            </div>
          </div>
        </div>
      `;
    }

    renderPage();
  </script>
</body>
</html>
