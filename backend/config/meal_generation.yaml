  # West Indian pairings
  "west:dal": ["rice", "roti", "bhakri", "rotla"]
  "west:sabzi": ["roti", "bhakri", "thepla", "rotla"]
  "west:curry": ["rice", "roti", "puri"]
  "west:thepla": ["chai", "pickle", "curd", "chundo"]
  "west:dhokla": ["chutney", "chai"]
  "west:khakhra": ["chai", "pickle"]
  "west:fafda": ["jalebi", "chai"]
  "west:poha": ["chai", "sev"]
  "west:undhiyu": ["puri", "shrikhand"]
  "west:biryani": ["raita", "salad"]
  "west:pav_bhaji": ["lassi", "buttermilk"]
  "west:chai": ["khakhra", "thepla", "biscuit"]
  "west:sweet": ["shrikhand", "chai"]

# Default pairings by meal type - flat string format "primary:accompaniment"
meal_type_pairs:
  breakfast:
    - "paratha:chai"
    - "poha:chai"
    - "idli:sambar"
    - "dosa:chutney"
    - "upma:chutney"
    - "thepla:chai"
    - "luchi:aloor_dom"
    - "dhokla:chutney"

  lunch:
    - "dal:rice"
    - "sabzi:roti"
    - "curry:rice"
    - "biryani:raita"
    - "khichdi:curd"
    - "rice:sambar"

  dinner:
    - "dal:roti"
    - "sabzi:paratha"
    - "khichdi:curd"
    - "pulao:raita"
    - "dosa:sambar"

  snacks:
    - "samosa:chai"
    - "pakora:chai"
    - "sandwich:chai"
    - "dhokla:chutney"
    - "vada:sambar"

# Meal type settings
meal_type_settings:
  breakfast_beverage_required: true
  lunch_beverage_required: false
  dinner_beverage_required: false
  snacks_beverage_required: true

