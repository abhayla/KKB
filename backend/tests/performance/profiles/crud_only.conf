# CRUD-Only Load Test — no AI calls, no Gemini cost
# Purpose: Baseline FastAPI + PostgreSQL performance without AI overhead
# Duration: 5 minutes, 50 users
# Cost: $0 (no Gemini API calls)
# Use: locust -f tests/performance/locustfile.py CRUDOnlyUser --config tests/performance/profiles/crud_only.conf

locustfile = tests/performance/locustfile.py
headless = true
users = 50
spawn-rate = 5
run-time = 5m
host = http://localhost:8000
html = tests/performance/reports/crud_report.html
csv = tests/performance/reports/crud
