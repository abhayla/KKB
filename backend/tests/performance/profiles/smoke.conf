# Smoke Test — verify endpoints work under minimal load
# Purpose: Quick sanity check after deployments
# Duration: 60 seconds, 1 user
# Cost: ~1 Gemini API call ($0.002)

locustfile = tests/performance/locustfile.py
headless = true
users = 1
spawn-rate = 1
run-time = 60s
host = http://localhost:8000
html = tests/performance/reports/smoke_report.html
csv = tests/performance/reports/smoke
