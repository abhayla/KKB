# Meal Generation System Configuration
# This file is the source of truth - synced to Firestore via sync_config.py

meal_structure:
  items_per_slot: 2
  expandable: true  # Allow 3+ items if multiple INCLUDE rules

  # Variable items based on cooking time (per Design Decision #1)
  time_based_items:
    enabled: true
    thresholds:
      - max_time: 30
        main_items: 1
        description: "Simple meal - 1 main + complementary"
      - max_time: 45
        main_items: 2
        description: "Full meal - 2 mains + complementary"
      - max_time: 9999
        main_items: 2
        description: "Elaborate meal - 2+ mains + complementary"

rule_behaviors:
  include:
    action: "adds_to_pair"
    allows_duplicates: true
    description: "INCLUDE item is guaranteed, paired with complementary item"
  exclude:
    action: "replaces_item_only"
    keeps_pair: true
    description: "Only excluded item replaced, pair remains"

conflict_resolution:
  strategy: "ask_user"
  description: "When INCLUDE conflicts with EXCLUDE, ask user which to keep"

# Recipe categories for pairing
