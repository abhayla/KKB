<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Connected Accounts</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <style>
    .account-card {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--sp-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--sp-md);
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      transition: all 0.2s ease-out;
    }
    .account-card:hover {
      box-shadow: var(--shadow-md);
    }
    .account-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .account-info {
      flex: 1;
      min-width: 0;
    }
    .account-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .account-status {
      font-size: 13px;
      margin-top: 2px;
    }
    .status-connected {
      color: var(--success);
    }
    .status-disconnected {
      color: var(--on-surface-variant);
    }
  </style>

  <script>
    initPage();

    let accounts = getState('connected_accounts', {
      google: { connected: true, email: 'ramesh.sharma@gmail.com' },
      whatsapp: { connected: false },
      apple_health: { connected: false }
    });

    function render() {
      document.getElementById('app').innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({ title: 'Connected Accounts', backLink: 'settings-main.html' })}

        <div class="screen-content">
          <div class="content-padding stagger-list">

            <div class="section-header-label">Linked Services</div>

            <!-- Google -->
            <div class="account-card">
              <div class="account-icon" style="background:#F1F3F4;">&#127279;</div>
              <div class="account-info">
                <div class="account-name">Google</div>
                ${accounts.google.connected
                  ? `<div class="account-status status-connected">Connected &middot; ${accounts.google.email}</div>`
                  : `<div class="account-status status-disconnected">Not connected</div>`
                }
              </div>
              ${accounts.google.connected
                ? `<button class="btn btn-outlined" style="height:36px;padding:0 16px;font-size:13px;color:var(--error);border-color:var(--error);" onclick="disconnectAccount('google')">Disconnect</button>`
                : `<button class="btn btn-filled" style="height:36px;padding:0 16px;font-size:13px;" onclick="connectAccount('google')">Connect</button>`
              }
            </div>

            <!-- WhatsApp -->
            <div class="account-card">
              <div class="account-icon" style="background:#DCF8C6;">&#128172;</div>
              <div class="account-info">
                <div class="account-name">WhatsApp</div>
                ${accounts.whatsapp.connected
                  ? `<div class="account-status status-connected">Connected</div>`
                  : `<div class="account-status status-disconnected">Not connected</div>`
                }
              </div>
              ${accounts.whatsapp.connected
                ? `<button class="btn btn-outlined" style="height:36px;padding:0 16px;font-size:13px;color:var(--error);border-color:var(--error);" onclick="disconnectAccount('whatsapp')">Disconnect</button>`
                : `<button class="btn btn-filled" style="height:36px;padding:0 16px;font-size:13px;" onclick="connectAccount('whatsapp')">Connect</button>`
              }
            </div>

            <!-- Apple Health -->
            <div class="account-card">
              <div class="account-icon" style="background:#FFE5E5;">&#10084;&#65039;</div>
              <div class="account-info">
                <div class="account-name">Apple Health</div>
                ${accounts.apple_health.connected
                  ? `<div class="account-status status-connected">Connected</div>`
                  : `<div class="account-status status-disconnected">Not connected</div>`
                }
              </div>
              ${accounts.apple_health.connected
                ? `<button class="btn btn-outlined" style="height:36px;padding:0 16px;font-size:13px;color:var(--error);border-color:var(--error);" onclick="disconnectAccount('apple_health')">Disconnect</button>`
                : `<button class="btn btn-filled" style="height:36px;padding:0 16px;font-size:13px;" onclick="connectAccount('apple_health')">Connect</button>`
              }
            </div>

          </div>
        </div>
      `;
    }

    function connectAccount(id) {
      accounts[id].connected = true;
      if (id === 'google') accounts[id].email = 'ramesh.sharma@gmail.com';
      setState('connected_accounts', accounts);
      render();
    }

    function disconnectAccount(id) {
      accounts[id].connected = false;
      setState('connected_accounts', accounts);
      render();
    }

    render();
  </script>
</body>
</html>
