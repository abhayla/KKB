<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Meal Status</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .status-sheet .handle {
      background: var(--outline-variant);
    }
    .status-sheet-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: var(--sp-xs);
    }
    .status-meal-name {
      color: var(--on-surface-variant);
      margin-bottom: var(--sp-lg);
    }
    .status-option {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-md);
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-md);
      margin-bottom: var(--sp-sm);
      cursor: pointer;
      transition: all var(--transition-normal);
      background: transparent;
    }
    .status-option:hover {
      background: var(--surface-warm);
    }
    .status-option.selected {
      border-color: var(--primary);
      background: color-mix(in srgb, var(--primary) 5%, transparent);
    }
    .status-option .status-icon {
      font-size: 24px;
      flex-shrink: 0;
      width: 32px;
      text-align: center;
    }
    .status-option .status-info {
      flex: 1;
    }
    .status-option .status-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .status-option .status-desc {
      font-size: 12px;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }
    .status-option .radio-indicator {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--outline);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition-normal);
    }
    .status-option.selected .radio-indicator {
      border-color: var(--primary);
    }
    .status-radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
      transition: background var(--transition-normal);
    }
    .status-option.selected .status-radio-dot {
      background: var(--primary);
    }
    #rating-section {
      margin: var(--sp-md) 0;
      padding: var(--sp-md);
      background: var(--surface-warm);
      border-radius: var(--radius-md);
    }
    .rating-label {
      font-weight: 500;
      margin-bottom: var(--sp-xs);
    }
    .star-rating {
      font-size: 28px;
    }
    .star-rating .star {
      cursor: pointer;
      color: var(--outline-variant);
      transition: color var(--transition-fast), transform var(--transition-fast);
    }
    .star-rating .star:hover {
      transform: scale(1.15);
    }
    .star-rating .star.filled {
      color: #FFB800;
    }
    .btn-update-status {
      width: 100%;
      margin-top: var(--sp-md);
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="main-home.html" class="nav-icon">&#9776;</a>
        <span class="title">RasoiAI</span>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:200px;"></div>
        </div>
      </div>

      <div class="bottom-sheet-overlay">
        <div class="bottom-sheet status-sheet">
          <div class="handle"></div>
          <div class="status-sheet-title">Update Meal Status</div>
          <div class="body-medium status-meal-name">Monday Dinner - Paneer Masala + Naan</div>

          <!-- Status Options -->
          ${[
            { id: 'planned', icon: '&#128197;', label: 'Planned', desc: 'Default - meal is in the plan' },
            { id: 'cooked', icon: '&#9989;', label: 'Cooked', desc: 'Mark as prepared and eaten' },
            { id: 'skipped', icon: '&#10060;', label: 'Skipped', desc: 'Nobody ate this meal' },
            { id: 'ordered', icon: '&#128188;', label: 'Ordered Out', desc: 'Ate out or ordered delivery' }
          ].map((s, i) => `
            <div class="status-option ${i === 0 ? 'selected' : ''}" data-id="${s.id}" onclick="document.querySelectorAll('.status-option').forEach(o => o.classList.remove('selected')); this.classList.add('selected'); document.getElementById('rating-section').style.display = this.dataset.id === 'cooked' ? 'block' : 'none';">
              <span class="status-icon">${s.icon}</span>
              <div class="status-info">
                <div class="status-label">${s.label}</div>
                <div class="status-desc">${s.desc}</div>
              </div>
              <div class="radio-indicator"><div class="status-radio-dot"></div></div>
            </div>
          `).join('')}

          <!-- Rating (shown when Cooked) -->
          <div id="rating-section" style="display:none;">
            <div class="body-medium rating-label">How was it?</div>
            <div class="star-rating">
              ${[1,2,3,4,5].map(i => `<span class="star" onclick="document.querySelectorAll('.star-rating .star').forEach((s,j)=>s.classList.toggle('filled',j<${i}));" >&#9733;</span>`).join('')}
            </div>
          </div>

          <button class="btn btn-filled btn-update-status">Update</button>
        </div>
      </div>
    `;
  </script>
</body>
</html>
