<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Leave Household</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="settings-household.html" class="nav-icon">&#8592;</a>
        <span class="title">Household</span>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:200px;"></div>
        </div>
      </div>

      <div class="dialog-overlay">
        <div class="dialog" style="max-width:320px;">
          <div style="text-align:center;margin-bottom:var(--sp-md);">
            <div style="width:56px;height:56px;border-radius:50%;background:var(--error-container);display:inline-flex;align-items:center;justify-content:center;font-size:28px;">&#9888;</div>
          </div>
          <div class="dialog-title" style="text-align:center;">Leave Sharma Family?</div>

          <div style="background:var(--error-container);border-radius:var(--radius-sm);padding:var(--sp-md);margin:var(--sp-md) 0 var(--sp-lg);">
            <div style="display:flex;align-items:flex-start;gap:var(--sp-sm);margin-bottom:var(--sp-sm);">
              <span style="color:var(--on-error-container);flex-shrink:0;">&#8226;</span>
              <span class="body-small" style="color:var(--on-error-container);">Your dietary constraints will be removed from shared meals</span>
            </div>
            <div style="display:flex;align-items:flex-start;gap:var(--sp-sm);margin-bottom:var(--sp-sm);">
              <span style="color:var(--on-error-container);flex-shrink:0;">&#8226;</span>
              <span class="body-small" style="color:var(--on-error-container);">Shared meal plan will be regenerated without you</span>
            </div>
            <div style="display:flex;align-items:flex-start;gap:var(--sp-sm);">
              <span style="color:var(--on-error-container);flex-shrink:0;">&#8226;</span>
              <span class="body-small" style="color:var(--on-error-container);">Your meal history will be preserved</span>
            </div>
          </div>

          <div class="dialog-actions" style="justify-content:stretch;">
            <a href="settings-household.html" class="btn btn-outlined" style="flex:1;text-decoration:none;">Cancel</a>
            <a href="settings-household.html" class="btn btn-filled" style="flex:1;text-decoration:none;background:var(--error);color:var(--on-error);">Leave Household</a>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
