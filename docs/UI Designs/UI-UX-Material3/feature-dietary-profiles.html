<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Dietary Profiles</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .profile-card {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--card-padding);
      margin-bottom: var(--sp-md);
      border: 2px solid transparent;
      transition: all var(--transition-normal);
    }
    .profile-card:hover {
      background: color-mix(in srgb, var(--surface-warm) 85%, var(--primary-container));
      box-shadow: var(--shadow-sm);
    }
    .profile-card.active {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
    }
    .profile-card .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-md);
    }
    .profile-card .profile-icon {
      font-size: 24px;
    }
    .profile-card .active-badge {
      background: var(--primary);
      color: var(--on-primary);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 700;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-sm);
    }
    .profile-grid .grid-label {
      font-size: 12px;
      color: var(--on-surface-variant);
      letter-spacing: 0.4px;
    }
    .profile-grid .grid-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--on-surface);
    }
    .profile-actions {
      display: flex;
      gap: var(--sp-sm);
      margin-top: var(--sp-md);
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: var(--sp-sm) var(--sp-md);
      background: color-mix(in srgb, var(--secondary) 10%, transparent);
      border-radius: var(--radius-full);
      margin-bottom: var(--sp-lg);
      width: fit-content;
    }
    .status-indicator .status-text {
      font-size: 12px;
      color: var(--secondary);
      font-weight: 600;
      letter-spacing: 0.4px;
    }
    .switch-note {
      background: var(--surface-variant);
      border-radius: var(--radius-sm);
      padding: var(--sp-md);
      margin-bottom: var(--sp-lg);
    }
    .switch-note span {
      font-size: 12px;
      color: var(--on-surface-variant);
      line-height: 1.5;
      letter-spacing: 0.4px;
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const profiles = getState('dietary_profiles', SHARMA_DEFAULTS.dietary_profiles);
    const activeProfile = getState('active_profile', 'home');

    const profileData = {
      home: { icon: '&#127968;', title: 'Home', diet: 'Vegetarian', cuisine: 'North Indian', time: '30 min', allergies: 'Peanuts, Cashews' },
      hostel: { icon: '&#127979;', title: 'Hostel', diet: 'Eggetarian', cuisine: 'South Indian', time: '15 min', allergies: 'Peanuts' }
    };

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Dietary Profiles', backLink: 'settings-main.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Active Profile Indicator -->
          <div class="status-indicator">
            <span class="status-dot linked"></span>
            <span class="status-text">Currently using: ${profileData[activeProfile]?.title || 'Home'}</span>
          </div>

          <!-- Profile Cards -->
          <div class="stagger-list">
          ${Object.entries(profileData).map(([key, p]) => `
            <div class="profile-card ${key === activeProfile ? 'active' : ''}">
              <div class="profile-header">
                <div style="display:flex;align-items:center;gap:var(--sp-sm);">
                  <span class="profile-icon">${p.icon}</span>
                  <div class="title-medium" style="font-weight:600;">${p.title}</div>
                  ${key === activeProfile ? '<span class="active-badge">ACTIVE</span>' : ''}
                </div>
              </div>

              <div class="profile-grid">
                <div>
                  <div class="grid-label">Diet</div>
                  <div class="grid-value">${p.diet}</div>
                </div>
                <div>
                  <div class="grid-label">Cuisine</div>
                  <div class="grid-value">${p.cuisine}</div>
                </div>
                <div>
                  <div class="grid-label">Cooking Time</div>
                  <div class="grid-value">${p.time}</div>
                </div>
                <div>
                  <div class="grid-label">Allergies</div>
                  <div class="grid-value">${p.allergies}</div>
                </div>
              </div>

              <div class="profile-actions">
                <button class="btn btn-outlined" style="flex:1;height:36px;padding:0;">Edit</button>
                ${key !== activeProfile ? `<button class="btn btn-filled" style="flex:1;height:36px;padding:0;" onclick="setState('active_profile','${key}');location.reload();">Set Active</button>` : ''}
              </div>
            </div>
          `).join('')}
          </div>

          <!-- Switch Note -->
          <div class="switch-note">
            <span>Switching profiles changes your meal generation preferences. Your current meal plan will be regenerated.</span>
          </div>

          <!-- Add Profile FAB -->
          <button class="btn btn-filled" style="width:100%;">+ Add Profile</button>
          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
