<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Add Recipe</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const app = document.getElementById('app');

    const favIds = getState('favorites', []);

    app.innerHTML = `
      ${renderStatusBar()}

      <!-- Dimmed parent preview -->
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="main-home.html" class="nav-icon">&#9776;</a>
        <span class="title">RasoiAI</span>
        <div class="actions">
          <span class="action-icon">&#128276;</span>
          <span class="action-icon">&#128100;</span>
        </div>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div class="week-header">
            <span class="week-range">Mar 2 - Mar 8, 2026</span>
          </div>
          <div style="height:40px;background:var(--surface-variant);border-radius:var(--radius-md);margin:var(--sp-sm) 0;"></div>
          <div style="height:80px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
        </div>
      </div>

      <!-- Bottom Sheet Overlay -->
      <div class="bottom-sheet-overlay">
        <div class="bottom-sheet" style="max-height:72%;">
          <div class="handle"></div>

          <!-- Header -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-sm);">
            <span class="title-large" style="font-size:18px;font-weight:600;">Add Recipe</span>
            <a href="main-home.html" class="icon-btn" style="text-decoration:none;">&#10005;</a>
          </div>

          <!-- Tab Bar -->
          <div class="tab-bar" style="margin:0 calc(-1 * var(--sp-md));margin-bottom:var(--sp-md);">
            <button class="tab active" id="tab-suggestions" onclick="document.getElementById('panel-suggestions').style.display='block';document.getElementById('panel-favorites').style.display='none';this.classList.add('active');document.getElementById('tab-favorites').classList.remove('active');">Suggestions</button>
            <button class="tab" id="tab-favorites" onclick="document.getElementById('panel-favorites').style.display='block';document.getElementById('panel-suggestions').style.display='none';this.classList.add('active');document.getElementById('tab-suggestions').classList.remove('active');">Favorites</button>
          </div>

          <!-- Suggestions Panel -->
          <div id="panel-suggestions">
            <div class="recipe-grid">
              ${[
                { name: 'Methi Thepla', time: 15, emoji: '&#129479;', cat: 'paratha' },
                { name: 'Moong Dal Cheela', time: 20, emoji: '&#129379;', cat: 'breakfast' },
                { name: 'Besan Chilla', time: 15, emoji: '&#127859;', cat: 'breakfast' },
                { name: 'Sabudana Khichdi', time: 20, emoji: '&#127834;', cat: 'breakfast' }
              ].map(r => `
                <div class="recipe-grid-item">
                  <div class="recipe-thumb">${r.emoji}</div>
                  <div class="recipe-grid-info">
                    <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">
                      <div class="veg-indicator" style="width:12px;height:12px;"></div>
                    </div>
                    <div class="recipe-grid-name">${r.name}</div>
                    <div class="recipe-grid-meta">
                      <span>&#9201; ${r.time} min</span>
                    </div>
                    <button class="btn btn-tonal" style="width:100%;margin-top:var(--sp-sm);height:32px;font-size:12px;">Add</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Favorites Panel -->
          <div id="panel-favorites" style="display:none;">
            <div class="recipe-grid">
              ${[
                { id: 'aloo-paratha', name: 'Aloo Paratha', time: 25, emoji: '&#129479;' },
                { id: 'masala-chai', name: 'Masala Chai', time: 10, emoji: '&#9749;' },
                { id: 'dal-fry', name: 'Dal Fry', time: 20, emoji: '&#129379;' },
                { id: 'paneer-tikka', name: 'Paneer Tikka', time: 30, emoji: '&#127835;' }
              ].map(r => `
                <div class="recipe-grid-item">
                  <div class="recipe-thumb">
                    ${r.emoji}
                    <button class="fav-btn" style="color:var(--error);">&#10084;</button>
                  </div>
                  <div class="recipe-grid-info">
                    <div class="recipe-grid-name">${r.name}</div>
                    <div class="recipe-grid-meta">
                      <span>&#9201; ${r.time} min</span>
                    </div>
                    <button class="btn btn-tonal" style="width:100%;margin-top:var(--sp-sm);height:32px;font-size:12px;">Add</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
