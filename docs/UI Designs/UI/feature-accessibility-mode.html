<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Accessibility</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const mode = getState('accessibility_mode', 'standard');

    const modes = [
      { id: 'standard', icon: '&#128241;', title: 'Standard', desc: 'Full features, normal text size. All navigation and options available.' },
      { id: 'simplified', icon: '&#128196;', title: 'Simplified', desc: "Today's meals only. Larger text, minimal navigation. Ideal for seniors or children." },
      { id: 'large-text', icon: '&#128269;', title: 'Large Text', desc: 'Standard features with 1.5x font scale for improved readability.' }
    ];

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Accessibility', backLink: 'settings-main.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Mode Selection -->
          <div class="section-header">
            <span class="section-title">Display Mode</span>
          </div>

          ${modes.map(m => `
            <div class="radio-card ${mode === m.id ? 'selected' : ''}" style="margin-bottom:var(--sp-md);flex-direction:row;gap:var(--sp-md);align-items:flex-start;" onclick="selectMode('${m.id}')">
              <span style="font-size:32px;">${m.icon}</span>
              <div style="flex:1;">
                <div class="title-small" style="font-weight:600;">${m.title}</div>
                <div class="body-small" style="color:var(--on-surface-variant);margin-top:2px;line-height:1.4;">${m.desc}</div>
              </div>
              <div class="radio ${mode === m.id ? 'selected' : ''}" style="${mode === m.id ? 'border-color:var(--primary);' : ''}"><div style="width:10px;height:10px;border-radius:50%;${mode === m.id ? 'background:var(--primary);' : ''}"></div></div>
            </div>
          `).join('')}

          <!-- Simplified Preview -->
          <div class="section-header" style="margin-top:var(--sp-lg);">
            <span class="section-title">Simplified Mode Preview</span>
          </div>
          <div style="border:2px solid var(--outline-variant);border-radius:var(--radius-lg);padding:var(--sp-lg);background:var(--surface);">
            <div class="title-large" style="text-align:center;margin-bottom:var(--sp-lg);">Today's Meals</div>
            ${['Breakfast', 'Lunch', 'Dinner', 'Snacks'].map(slot => `
              <div style="background:var(--surface-variant);border-radius:var(--radius-md);padding:var(--sp-md);margin-bottom:var(--sp-sm);">
                <div class="title-small" style="font-weight:700;color:var(--primary);margin-bottom:2px;">${slot}</div>
                <div class="title-medium" style="font-weight:500;">Masala Chai + Aloo Paratha</div>
              </div>
            `).join('')}
          </div>

          <!-- Language -->
          <div class="section-header" style="margin-top:var(--sp-lg);">
            <span class="section-title">Language</span>
          </div>
          <div class="card">
            <select class="text-field" style="height:48px;font-size:14px;">
              <option selected>English</option>
              <option>Hindi</option>
              <option>Tamil</option>
              <option>Bengali</option>
              <option>Marathi</option>
            </select>
          </div>

          <button class="btn btn-filled" style="width:100%;margin-top:var(--sp-xl);">Apply</button>
          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;

    function selectMode(id) {
      setState('accessibility_mode', id);
      location.reload();
    }
  </script>
</body>
</html>
