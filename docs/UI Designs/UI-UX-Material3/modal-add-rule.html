<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Add Rule</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .add-rule-sheet .handle {
      background: var(--outline-variant);
    }
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-lg);
    }
    .sheet-header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .field-group {
      margin-bottom: var(--sp-lg);
    }
    .field-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--on-surface-variant);
      margin-bottom: var(--sp-sm);
    }
    .action-type-row {
      display: flex;
      gap: var(--sp-md);
    }
    .action-type-option {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      cursor: pointer;
      flex: 1;
      padding: var(--sp-sm) var(--sp-md);
      border-radius: var(--radius-md);
      border: 2px solid var(--outline-variant);
      transition: all var(--transition-normal);
      background: transparent;
    }
    .action-type-option:hover {
      background: var(--surface-warm);
    }
    .action-type-option.include-active {
      border-color: var(--secondary);
      background: color-mix(in srgb, var(--secondary) 8%, transparent);
    }
    .action-type-option.exclude-active {
      border-color: var(--error);
      background: color-mix(in srgb, var(--error) 8%, transparent);
    }
    .field-group .text-field {
      height: 48px;
      font-size: 14px;
      background: var(--surface-warm);
      border: 1px solid var(--outline-variant);
      transition: all var(--transition-normal);
    }
    .field-group .text-field:focus {
      background: var(--surface);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 12%, transparent);
    }
    .enforcement-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-md);
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      margin-bottom: var(--sp-lg);
    }
    .enforcement-toggle-group {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .sheet-actions {
      display: flex;
      gap: var(--sp-sm);
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const app = document.getElementById('app');
    app.innerHTML = `
      ${renderStatusBar()}

      <!-- Dimmed parent preview -->
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="feature-recipe-rules.html" class="nav-icon">&#8592;</a>
        <span class="title">Recipe Rules</span>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:48px;background:var(--surface-variant);border-radius:var(--radius-md);margin:var(--sp-sm) 0;"></div>
          <div style="height:64px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
          <div style="height:64px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
          <div style="height:64px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
        </div>
      </div>

      <!-- Bottom Sheet Overlay -->
      <div class="bottom-sheet-overlay">
        <div class="bottom-sheet add-rule-sheet" style="max-height:82%;overflow-y:auto;">
          <div class="handle"></div>

          <div class="sheet-header">
            <span class="sheet-header-title">Add Rule</span>
            <a href="feature-recipe-rules.html" class="icon-btn" style="text-decoration:none;">&#10005;</a>
          </div>

          <!-- Action Type -->
          <div class="field-group">
            <div class="field-label">Action Type</div>
            <div class="action-type-row">
              <label class="action-type-option include-active" id="radio-include" onclick="document.getElementById('radio-include').className='action-type-option include-active';document.getElementById('radio-exclude').className='action-type-option';">
                <div class="radio selected" style="border-color:var(--secondary);"><div style="width:10px;height:10px;border-radius:50%;background:var(--secondary);"></div></div>
                <span style="font-weight:500;color:var(--secondary);">Include</span>
              </label>
              <label class="action-type-option" id="radio-exclude" onclick="document.getElementById('radio-exclude').className='action-type-option exclude-active';document.getElementById('radio-include').className='action-type-option';">
                <div class="radio"></div>
                <span style="font-weight:500;color:var(--error);">Exclude</span>
              </label>
            </div>
          </div>

          <!-- Search Field -->
          <div class="field-group">
            <div class="field-label">Recipe or Ingredient</div>
            <input type="text" class="text-field" placeholder="Search for recipe or ingredient...">
          </div>

          <!-- Frequency Picker -->
          <div class="field-group">
            <div class="field-label">Frequency</div>
            <div class="chip-group" id="freq-chips">
              <button class="chip selected" onclick="selectFreq(this);document.getElementById('times-input').style.display='none';document.getElementById('days-input').style.display='none';">Daily</button>
              <button class="chip" onclick="selectFreq(this);document.getElementById('times-input').style.display='flex';document.getElementById('days-input').style.display='none';">Times per Week</button>
              <button class="chip" onclick="selectFreq(this);document.getElementById('times-input').style.display='none';document.getElementById('days-input').style.display='none';">Never</button>
              <button class="chip" onclick="selectFreq(this);document.getElementById('times-input').style.display='none';document.getElementById('days-input').style.display='flex';">Specific Days</button>
            </div>

            <!-- Times per week input -->
            <div id="times-input" style="display:none;align-items:center;gap:var(--sp-sm);margin-top:var(--sp-sm);">
              <span class="body-medium">Times:</span>
              <input type="number" class="text-field" value="4" min="1" max="7" style="width:64px;height:40px;text-align:center;font-size:14px;background:var(--surface-warm);">
              <span class="body-small" style="color:var(--on-surface-variant);">per week</span>
            </div>

            <!-- Specific days chips -->
            <div id="days-input" style="display:none;margin-top:var(--sp-sm);">
              <div class="chip-group">
                ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => `
                  <button class="chip" onclick="this.classList.toggle('selected')">${d}</button>
                `).join('')}
              </div>
            </div>
          </div>

          <!-- Meal Slot Chips -->
          <div class="field-group">
            <div class="field-label">Meal Slots</div>
            <div class="chip-group">
              <button class="chip selected" onclick="this.classList.toggle('selected')">Breakfast</button>
              <button class="chip" onclick="this.classList.toggle('selected')">Lunch</button>
              <button class="chip" onclick="this.classList.toggle('selected')">Dinner</button>
              <button class="chip" onclick="this.classList.toggle('selected')">Snacks</button>
            </div>
          </div>

          <!-- Enforcement Toggle -->
          <div class="enforcement-row">
            <div>
              <div class="title-small" style="font-weight:600;">Enforcement</div>
              <div class="body-small" style="color:var(--on-surface-variant);">Strict rules are always enforced</div>
            </div>
            <div class="enforcement-toggle-group">
              <span class="body-small" style="color:var(--on-surface-variant);">Flexible</span>
              <button class="toggle on" onclick="this.classList.toggle('on');"></button>
              <span class="body-small" style="font-weight:500;">Strict</span>
            </div>
          </div>

          <!-- Actions -->
          <div class="sheet-actions">
            <a href="feature-recipe-rules.html" class="btn btn-text" style="flex:1;text-decoration:none;">Cancel</a>
            <a href="feature-recipe-rules.html" class="btn btn-filled" style="flex:1;text-decoration:none;">Add Rule</a>
          </div>
        </div>
      </div>
    `;

    function selectFreq(btn) {
      document.querySelectorAll('#freq-chips .chip').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
    }
  </script>
</body>
</html>
