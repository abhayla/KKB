<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Accessibility</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .mode-card {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-md);
      padding: var(--sp-md);
      margin-bottom: var(--sp-md);
      border-radius: var(--radius-md);
      background: var(--surface-warm);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    .mode-card:hover {
      background: color-mix(in srgb, var(--surface-warm) 85%, var(--primary-container));
      box-shadow: var(--shadow-sm);
    }
    .mode-card.selected {
      border-color: var(--primary);
      background: var(--primary-container);
    }
    .mode-card .mode-icon {
      font-size: 32px;
      flex-shrink: 0;
    }
    .mode-card .mode-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .mode-card .mode-desc {
      font-size: 12px;
      color: var(--on-surface-variant);
      margin-top: 2px;
      line-height: 1.4;
    }
    .mode-card .mode-radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--outline);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      transition: border-color var(--transition-fast);
    }
    .mode-card.selected .mode-radio {
      border-color: var(--primary);
    }
    .mode-card .mode-radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
      transition: background var(--transition-fast);
    }
    .mode-card.selected .mode-radio-dot {
      background: var(--primary);
    }
    .preview-area {
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      padding: var(--sp-lg);
      background: var(--surface-warm);
    }
    .preview-slot {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--sp-md);
      margin-bottom: var(--sp-sm);
      box-shadow: var(--shadow-sm);
    }
    .preview-slot:last-child {
      margin-bottom: 0;
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const mode = getState('accessibility_mode', 'standard');

    const modes = [
      { id: 'standard', icon: '&#128241;', title: 'Standard', desc: 'Full features, normal text size. All navigation and options available.' },
      { id: 'simplified', icon: '&#128196;', title: 'Simplified', desc: "Today's meals only. Larger text, minimal navigation. Ideal for seniors or children." },
      { id: 'large-text', icon: '&#128269;', title: 'Large Text', desc: 'Standard features with 1.5x font scale for improved readability.' }
    ];

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Accessibility', backLink: 'settings-main.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Mode Selection -->
          <div class="section-header">
            <span class="section-title">Display Mode</span>
          </div>

          <div class="stagger-list">
          ${modes.map(m => `
            <div class="mode-card ${mode === m.id ? 'selected' : ''}" onclick="selectMode('${m.id}')">
              <span class="mode-icon">${m.icon}</span>
              <div style="flex:1;">
                <div class="mode-title">${m.title}</div>
                <div class="mode-desc">${m.desc}</div>
              </div>
              <div class="mode-radio"><div class="mode-radio-dot"></div></div>
            </div>
          `).join('')}
          </div>

          <!-- Simplified Preview -->
          <div class="section-header" style="margin-top:var(--sp-lg);">
            <span class="section-title">Simplified Mode Preview</span>
          </div>
          <div class="preview-area">
            <div class="title-large" style="text-align:center;margin-bottom:var(--sp-lg);color:var(--on-surface);">Today's Meals</div>
            ${['Breakfast', 'Lunch', 'Dinner', 'Snacks'].map(slot => `
              <div class="preview-slot">
                <div class="title-small" style="font-weight:700;color:var(--primary);margin-bottom:2px;">${slot}</div>
                <div class="title-medium" style="font-weight:500;color:var(--on-surface);">Masala Chai + Aloo Paratha</div>
              </div>
            `).join('')}
          </div>

          <!-- Language -->
          <div class="section-header" style="margin-top:var(--sp-lg);">
            <span class="section-title">Language</span>
          </div>
          <div class="card-filled" style="padding:var(--sp-md);">
            <select class="text-field" style="height:48px;font-size:14px;">
              <option selected>English</option>
              <option>Hindi</option>
              <option>Tamil</option>
              <option>Bengali</option>
              <option>Marathi</option>
            </select>
          </div>

          <button class="btn btn-filled" style="width:100%;margin-top:var(--sp-xl);">Apply</button>
          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;

    function selectMode(id) {
      setState('accessibility_mode', id);
      location.reload();
    }
  </script>
</body>
</html>
