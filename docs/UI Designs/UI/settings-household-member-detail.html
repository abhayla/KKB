<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Member Detail</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const members = getHouseholdMembers();
    const member = members[1]; // Sunita as example

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Member Details', backLink: 'settings-household-members.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Profile Header -->
          <div style="text-align:center;padding:var(--sp-md) 0 var(--sp-lg);">
            ${renderMemberAvatar(member.name, 64)}
            <div class="title-large" style="color:var(--on-surface);margin-top:var(--sp-sm);">${member.name}</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:var(--sp-xs);margin-top:4px;">
              <span class="status-dot ${member.user_id ? 'linked' : 'unlinked'}"></span>
              <span class="body-small" style="color:var(--on-surface-variant);">${member.user_id ? 'App linked' : 'Metadata only'}</span>
            </div>
            ${member.phone ? `<div class="body-small" style="color:var(--on-surface-variant);margin-top:2px;">${member.phone}</div>` : ''}
          </div>

          <!-- Role -->
          <div class="section-header">
            <span class="section-title">Role</span>
          </div>
          <div class="card" style="margin-bottom:var(--sp-lg);">
            <div class="segment-control">
              <button class="segment-btn" onclick="selectSegment(this)">Owner</button>
              <button class="segment-btn active" onclick="selectSegment(this)">Member</button>
              <button class="segment-btn" onclick="selectSegment(this)">Guest</button>
            </div>
          </div>

          <!-- Permissions -->
          <div class="section-header">
            <span class="section-title">Permissions</span>
          </div>
          <div class="card" style="margin-bottom:var(--sp-lg);">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--sp-xs) 0;">
              <div>
                <div class="title-small" style="font-weight:500;">Can edit shared meals</div>
                <div class="body-small" style="color:var(--on-surface-variant);">Lock, swap, and modify shared meal slots</div>
              </div>
              <button class="toggle on" onclick="this.classList.toggle('on');"></button>
            </div>
          </div>

          <!-- Health Conditions -->
          <div class="section-header">
            <span class="section-title">Health Conditions</span>
          </div>
          <div class="card" style="margin-bottom:var(--sp-lg);">
            <div class="chip-group">
              ${member.health.map(h => `<button class="chip selected" onclick="this.classList.toggle('selected')">${h.replace('_', ' ')}</button>`).join('')}
              <button class="chip" onclick="this.classList.toggle('selected')">Diabetic</button>
              <button class="chip" onclick="this.classList.toggle('selected')">Low Oil</button>
              <button class="chip" onclick="this.classList.toggle('selected')">No Spicy</button>
            </div>
          </div>

          <!-- Meal Slot Participation -->
          <div class="section-header">
            <span class="section-title">Meal Slot Participation</span>
          </div>
          <div class="card" style="margin-bottom:var(--sp-lg);">
            <div class="body-small" style="color:var(--on-surface-variant);margin-bottom:var(--sp-sm);">Uncheck slots this member doesn't eat at home</div>
            ${['Breakfast', 'Lunch', 'Dinner', 'Snacks'].map((slot, i) => {
              const active = member.active_slots.includes(slot.toLowerCase());
              return `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--sp-sm) 0;${i > 0 ? 'border-top:1px solid var(--outline-variant);' : ''}">
                  <span class="body-medium">${slot}</span>
                  <button class="toggle ${active ? 'on' : ''}" onclick="this.classList.toggle('on');"></button>
                </div>
              `;
            }).join('')}
          </div>

          <!-- Portion Size -->
          <div class="section-header">
            <span class="section-title">Portion Size</span>
          </div>
          <div class="card" style="margin-bottom:var(--sp-lg);">
            <div class="segment-control">
              <button class="segment-btn" onclick="selectSegment(this)">Small</button>
              <button class="segment-btn active" onclick="selectSegment(this)">Regular</button>
              <button class="segment-btn" onclick="selectSegment(this)">Large</button>
            </div>
          </div>

          <!-- Actions -->
          <button class="btn btn-filled" style="width:100%;margin-bottom:var(--sp-md);">Save Changes</button>
          <button class="btn btn-outlined" style="width:100%;color:var(--error);border-color:var(--error);">Remove from Household</button>

          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;

    function selectSegment(btn) {
      btn.parentElement.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
