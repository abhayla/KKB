<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Dietary Profiles</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const profiles = getState('dietary_profiles', SHARMA_DEFAULTS.dietary_profiles);
    const activeProfile = getState('active_profile', 'home');

    const profileData = {
      home: { icon: '&#127968;', title: 'Home', diet: 'Vegetarian', cuisine: 'North Indian', time: '30 min', allergies: 'Peanuts, Cashews' },
      hostel: { icon: '&#127979;', title: 'Hostel', diet: 'Eggetarian', cuisine: 'South Indian', time: '15 min', allergies: 'Peanuts' }
    };

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Dietary Profiles', backLink: 'settings-main.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Active Profile Indicator -->
          <div style="display:flex;align-items:center;gap:var(--sp-sm);padding:var(--sp-sm) var(--sp-md);background:color-mix(in srgb, var(--secondary) 10%, transparent);border-radius:var(--radius-full);margin-bottom:var(--sp-lg);width:fit-content;">
            <span class="status-dot linked"></span>
            <span class="body-small" style="color:var(--secondary);font-weight:600;">Currently using: ${profileData[activeProfile]?.title || 'Home'}</span>
          </div>

          <!-- Profile Cards -->
          ${Object.entries(profileData).map(([key, p]) => `
            <div class="card" style="margin-bottom:var(--sp-md);border:2px solid ${key === activeProfile ? 'var(--primary)' : 'transparent'};">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md);">
                <div style="display:flex;align-items:center;gap:var(--sp-sm);">
                  <span style="font-size:24px;">${p.icon}</span>
                  <div class="title-medium" style="font-weight:600;">${p.title}</div>
                  ${key === activeProfile ? '<span style="background:var(--primary);color:var(--on-primary);padding:2px 8px;border-radius:var(--radius-full);font-size:10px;font-weight:700;">ACTIVE</span>' : ''}
                </div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-sm);">
                <div>
                  <div class="body-small" style="color:var(--on-surface-variant);">Diet</div>
                  <div class="body-medium" style="font-weight:500;">${p.diet}</div>
                </div>
                <div>
                  <div class="body-small" style="color:var(--on-surface-variant);">Cuisine</div>
                  <div class="body-medium" style="font-weight:500;">${p.cuisine}</div>
                </div>
                <div>
                  <div class="body-small" style="color:var(--on-surface-variant);">Cooking Time</div>
                  <div class="body-medium" style="font-weight:500;">${p.time}</div>
                </div>
                <div>
                  <div class="body-small" style="color:var(--on-surface-variant);">Allergies</div>
                  <div class="body-medium" style="font-weight:500;">${p.allergies}</div>
                </div>
              </div>

              <div style="display:flex;gap:var(--sp-sm);margin-top:var(--sp-md);">
                <button class="btn btn-outlined" style="flex:1;height:36px;padding:0;">Edit</button>
                ${key !== activeProfile ? `<button class="btn btn-filled" style="flex:1;height:36px;padding:0;" onclick="setState('active_profile','${key}');location.reload();">Set Active</button>` : ''}
              </div>
            </div>
          `).join('')}

          <!-- Switch Note -->
          <div style="background:var(--surface-variant);border-radius:var(--radius-sm);padding:var(--sp-md);margin-bottom:var(--sp-lg);">
            <span class="body-small" style="color:var(--on-surface-variant);line-height:1.5;">Switching profiles changes your meal generation preferences. Your current meal plan will be regenerated.</span>
          </div>

          <!-- Add Profile FAB -->
          <button class="btn btn-filled" style="width:100%;">+ Add Profile</button>
          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
