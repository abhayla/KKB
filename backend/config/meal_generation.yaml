# Pairing rules - flattened structure for Firestore compatibility
# Format: "cuisine:category" -> pairs_with list
pairing_rules_flat:
  # North Indian pairings
  "north:dal": ["rice", "roti", "paratha", "naan"]
  "north:sabzi": ["roti", "paratha", "rice", "naan"]
  "north:curry": ["rice", "roti", "naan", "paratha"]
  "north:biryani": ["raita", "salad"]
  "north:pulao": ["raita", "dal", "curry"]
  "north:paratha": ["chai", "curd", "pickle", "raita"]
  "north:khichdi": ["curd", "pickle", "papad", "kadhi"]
  "north:roti": ["dal", "sabzi", "curry"]
  "north:naan": ["curry", "dal", "sabzi"]
  "north:poha": ["chai", "sev"]
  "north:upma": ["chai", "chutney"]
  "north:samosa": ["chai", "chutney"]
  "north:pakora": ["chai", "chutney"]
  "north:chai": ["paratha", "biscuit", "samosa", "pakora", "sandwich"]
  "north:sweet": ["chai", "milk"]

  # South Indian pairings
  "south:dosa": ["sambar", "chutney"]
  "south:idli": ["sambar", "chutney"]
  "south:uttapam": ["sambar", "chutney"]
  "south:vada": ["sambar", "chutney"]
  "south:upma": ["chutney", "sambar", "coffee"]
  "south:rice": ["sambar", "rasam", "curry", "dal"]
  "south:dal": ["rice", "appam", "dosa"]
  "south:sambar": ["rice", "idli", "dosa", "vada"]
  "south:rasam": ["rice"]
  "south:curry": ["rice", "appam", "parotta"]
  "south:biryani": ["raita", "salan"]
  "south:coffee": ["idli", "dosa", "biscuit"]
