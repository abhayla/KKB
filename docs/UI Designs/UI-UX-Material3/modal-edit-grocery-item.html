<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Edit Grocery Item</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .edit-grocery-sheet .handle {
      background: var(--outline-variant);
    }
    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-lg);
    }
    .sheet-header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .field-group {
      margin-bottom: var(--sp-md);
    }
    .field-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--on-surface-variant);
      margin-bottom: var(--sp-xs);
    }
    .field-group .text-field {
      height: 48px;
      font-size: 14px;
      background: var(--surface-warm);
      border: 1px solid var(--outline-variant);
      transition: all var(--transition-normal);
    }
    .field-group .text-field:focus {
      background: var(--surface);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 12%, transparent);
    }
    .field-group .dropdown-trigger {
      background: var(--surface-warm);
      border: 1px solid var(--outline-variant);
    }
    .field-row {
      display: flex;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-lg);
    }
    .sheet-actions {
      display: flex;
      gap: var(--sp-sm);
    }
    .btn-delete-item {
      background: var(--error) !important;
      color: var(--on-error) !important;
      box-shadow: 0 2px 6px rgba(186, 26, 26, 0.2);
    }
    .btn-delete-item:hover {
      box-shadow: 0 4px 12px rgba(186, 26, 26, 0.3) !important;
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const app = document.getElementById('app');
    app.innerHTML = `
      ${renderStatusBar()}

      <!-- Dimmed parent preview -->
      <div class="top-app-bar" style="opacity:0.3;">
        <span class="title" style="flex:none;">Grocery List</span>
        <div class="actions">
          <span class="action-icon">&#128269;</span>
          <span class="action-icon">&#8942;</span>
        </div>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:32px;background:var(--surface-variant);border-radius:var(--radius-md);margin:var(--sp-sm) 0;width:60%;"></div>
          <div style="height:48px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
          <div style="height:48px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);border-left:3px solid var(--primary);"></div>
          <div style="height:48px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
          <div style="height:48px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
        </div>
      </div>

      <!-- Bottom Sheet Overlay -->
      <div class="bottom-sheet-overlay">
        <div class="bottom-sheet edit-grocery-sheet" style="max-height:60%;">
          <div class="handle"></div>

          <div class="sheet-header">
            <span class="sheet-header-title">Edit Item</span>
            <a href="main-grocery.html" class="icon-btn" style="text-decoration:none;">&#10005;</a>
          </div>

          <!-- Name Field (pre-filled) -->
          <div class="field-group">
            <div class="field-label">Name</div>
            <input type="text" class="text-field" value="Potato">
          </div>

          <!-- Category Dropdown (pre-filled) -->
          <div class="field-group">
            <div class="field-label">Category</div>
            <div class="dropdown">
              <button class="dropdown-trigger" style="height:48px;" onclick="this.nextElementSibling.classList.toggle('open');">
                <span id="cat-val">Vegetables</span>
                <span>&#9662;</span>
              </button>
              <div class="dropdown-menu">
                ${['Vegetables','Dairy','Grains','Pulses','Spices','Oil & Ghee','Other'].map(c => `
                  <div class="dropdown-item${c === 'Vegetables' ? ' selected' : ''}" onclick="document.getElementById('cat-val').textContent='${c}';this.parentElement.classList.remove('open');">${c}</div>
                `).join('')}
              </div>
            </div>
          </div>

          <!-- Quantity + Unit Row (pre-filled) -->
          <div class="field-row">
            <div class="field-group" style="flex:1;margin-bottom:0;">
              <div class="field-label">Quantity</div>
              <input type="number" class="text-field" value="1">
            </div>
            <div class="field-group" style="flex:1;margin-bottom:0;">
              <div class="field-label">Unit</div>
              <div class="dropdown">
                <button class="dropdown-trigger" style="height:48px;" onclick="this.nextElementSibling.classList.toggle('open');">
                  <span id="unit-val">kg</span>
                  <span>&#9662;</span>
                </button>
                <div class="dropdown-menu">
                  ${['g','kg','ml','L','pcs','bunch'].map(u => `
                    <div class="dropdown-item${u === 'kg' ? ' selected' : ''}" onclick="document.getElementById('unit-val').textContent='${u}';this.parentElement.classList.remove('open');">${u}</div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="sheet-actions">
            <a href="main-grocery.html" class="btn btn-filled" style="flex:2;text-decoration:none;">Save</a>
            <a href="main-grocery.html" class="btn btn-filled btn-delete-item" style="flex:1;text-decoration:none;">Delete</a>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
