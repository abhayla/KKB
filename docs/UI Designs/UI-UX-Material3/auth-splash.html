<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Splash</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .splash-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--gradient-hero);
      padding: var(--sp-lg);
      text-align: center;
      gap: var(--sp-lg);
      position: relative;
      overflow: hidden;
    }

    /* Decorative floating food emojis */
    .splash-decor {
      position: absolute;
      font-size: 32px;
      opacity: 0.12;
      animation: floatUp 6s ease-in-out infinite;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    .splash-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 16px rgba(0,0,0,0.15);
      line-height: 1.1;
      animation: bounceIn 0.8s ease-out;
    }
    .splash-hindi {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      margin-top: -4px;
      animation: fadeInUp 0.5s ease-out 0.3s backwards;
    }
    .splash-tagline {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      max-width: 260px;
      animation: fadeInUp 0.5s ease-out 0.5s backwards;
    }
    .splash-spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-md);
    }
    .splash-spinner-wrap .progress-circular {
      border-color: rgba(255,255,255,0.3);
      border-top-color: white;
      width: 36px;
      height: 36px;
    }
    .splash-bottom {
      padding: var(--sp-lg) var(--sp-lg) var(--sp-xxl);
      background: linear-gradient(to top, rgba(255,240,232,0.95) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-md);
      animation: fadeInUp 0.5s ease-out 0.7s backwards;
    }
    .splash-bottom .btn-filled {
      background: white;
      color: var(--primary);
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      width: 100%;
    }
    .splash-bottom .btn-filled:hover {
      box-shadow: var(--shadow-xl);
    }
    .splash-secondary-link {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-status-bar" style="background:transparent; color:white;">
      <span class="time">9:41</span>
      <span class="icons">&#x1F4F6; &#x1F50B;</span>
    </div>

    <div class="splash-body">
      <!-- Decorative food emojis -->
      <span class="splash-decor" style="top:10%;left:10%;animation-delay:0s;">&#x1F35B;</span>
      <span class="splash-decor" style="top:20%;right:15%;animation-delay:1s;">&#xAB;&#x1FAB6;</span>
      <span class="splash-decor" style="bottom:25%;left:20%;animation-delay:2s;">&#x1F958;</span>
      <span class="splash-decor" style="bottom:15%;right:10%;animation-delay:3s;">&#x1F35A;</span>

      <div>
        <div class="splash-logo">RasoiAI</div>
        <div class="splash-hindi">&#x0930;&#x0938;&#x094B;&#x0908; AI</div>
      </div>

      <div class="splash-spinner-wrap">
        <div class="progress-circular"></div>
      </div>

      <p class="splash-tagline">Your AI-powered Indian kitchen assistant</p>
    </div>

    <div class="splash-bottom">
      <a href="auth-phone.html" class="btn-filled btn-large w-full" style="text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">
        Get Started
      </a>
      <a href="auth-phone.html" class="splash-secondary-link">Already have an account?</a>
    </div>
  </div>

  <script>initPage();</script>
</body>
</html>
