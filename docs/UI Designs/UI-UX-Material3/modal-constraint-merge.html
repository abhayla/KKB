<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Merged Constraints</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .merge-dialog {
      max-width: 340px;
    }
    .merge-emoji {
      font-size: 40px;
      display: inline-block;
      animation: bounceIn 0.5s ease-out;
    }
    .constraint-section {
      margin-bottom: var(--sp-md);
    }
    .constraint-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--sp-xs);
    }
    .allergy-chip {
      background: var(--error-container) !important;
      color: var(--on-error-container) !important;
      pointer-events: none;
      border: none;
    }
    .allergy-chip .owner-hint {
      opacity: 0.7;
      font-size: 10px;
    }
    .dislike-chip {
      pointer-events: none;
      background: var(--surface-warm);
      border: 1px solid var(--outline-variant);
    }
    .dietary-result {
      background: var(--secondary-container);
      border-radius: var(--radius-md);
      padding: var(--sp-sm) var(--sp-md);
    }
    .dietary-result-text {
      color: var(--on-secondary-container);
      font-weight: 500;
    }
    .viable-count-banner {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: var(--sp-sm) var(--sp-md);
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      margin-bottom: var(--sp-lg);
      border: 1px solid color-mix(in srgb, var(--secondary) 20%, transparent);
    }
    .viable-count-banner .count-icon {
      font-size: 20px;
    }
    .viable-count-banner .count-text {
      color: var(--secondary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="main-home.html" class="nav-icon">&#9776;</a>
        <span class="title">RasoiAI</span>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:200px;"></div>
        </div>
      </div>

      <div class="dialog-overlay">
        <div class="dialog merge-dialog">
          <div style="text-align:center;margin-bottom:var(--sp-md);">
            <span class="merge-emoji">&#128256;</span>
          </div>
          <div class="dialog-title" style="text-align:center;">Merged Constraints</div>
          <div class="body-small" style="color:var(--on-surface-variant);text-align:center;margin-bottom:var(--sp-lg);">Combined dietary rules from all household members</div>

          <!-- Allergies -->
          <div class="constraint-section">
            <div class="constraint-section-label" style="color:var(--error);">Allergies (Never Include)</div>
            <div class="chip-group">
              <span class="chip allergy-chip">Peanuts <span class="owner-hint">(Ramesh)</span></span>
              <span class="chip allergy-chip">Cashews <span class="owner-hint">(Ramesh)</span></span>
            </div>
          </div>

          <!-- Dislikes -->
          <div class="constraint-section">
            <div class="constraint-section-label" style="color:var(--on-surface-variant);">Dislikes (Avoid)</div>
            <div class="chip-group">
              <span class="chip dislike-chip">Karela</span>
              <span class="chip dislike-chip">Baingan</span>
              <span class="chip dislike-chip">Mushroom</span>
            </div>
          </div>

          <!-- Dietary -->
          <div class="constraint-section">
            <div class="constraint-section-label" style="color:var(--secondary);">Strictest Dietary Rule</div>
            <div class="dietary-result">
              <span class="body-medium dietary-result-text">Vegetarian + Sattvic (no onion/garlic)</span>
            </div>
          </div>

          <!-- Viable Recipe Count -->
          <div class="viable-count-banner">
            <span class="count-icon">&#9989;</span>
            <span class="body-medium count-text">847 viable recipes match all constraints</span>
          </div>

          <div class="dialog-actions" style="justify-content:stretch;">
            <a href="feature-recipe-rules.html" class="btn btn-outlined" style="flex:1;text-decoration:none;">Adjust Rules</a>
            <a href="main-home.html" class="btn btn-filled" style="flex:1;text-decoration:none;">Generate Anyway</a>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
