<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Family Members</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <style>
    .member-card {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--sp-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--sp-md);
      display: flex;
      align-items: flex-start;
      gap: var(--sp-md);
      transition: all 0.2s ease-out;
    }
    .member-card:hover {
      box-shadow: var(--shadow-md);
    }
    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .member-info {
      flex: 1;
      min-width: 0;
    }
    .member-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .member-meta {
      font-size: 13px;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }
    .member-health {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: var(--sp-sm);
    }
    .health-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: var(--error-container);
      color: var(--on-error-container);
    }
    .member-actions {
      display: flex;
      gap: var(--sp-xs);
      flex-shrink: 0;
    }
    .type-badge {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      background: var(--secondary-container);
      color: var(--on-secondary-container);
    }
  </style>

  <script>
    initPage();

    let members = getState('family_members', SHARMA_DEFAULTS.family_members);
    let editingId = null;

    const avatarColors = [
      { bg: 'var(--primary-container)', fg: 'var(--on-primary-container)' },
      { bg: 'var(--secondary-container)', fg: 'var(--on-secondary-container)' },
      { bg: 'var(--tertiary-container)', fg: 'var(--on-tertiary-container)' }
    ];

    function render() {
      document.getElementById('app').innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({ title: 'Family Members', backLink: 'settings-main.html' })}

        <div class="screen-content">
          <div class="content-padding stagger-list">

            ${getHousehold() ? `
              <a href="settings-household-members.html" style="text-decoration:none;">
                <div style="background:var(--primary-container);border-radius:var(--radius-md);padding:var(--sp-md);margin-bottom:var(--sp-lg);display:flex;align-items:flex-start;gap:var(--sp-sm);">
                  <span style="color:var(--on-primary-container);font-size:16px;flex-shrink:0;">&#9432;</span>
                  <div>
                    <div class="body-small" style="color:var(--on-primary-container);font-weight:500;">Part of ${getHousehold().name}</div>
                    <div class="body-small" style="color:var(--on-primary-container);opacity:0.8;margin-top:2px;">Members below are metadata. App-linked members are in Household settings.</div>
                    <span class="body-small" style="color:var(--on-primary-container);font-weight:600;margin-top:var(--sp-xs);display:inline-block;">View Household &#8250;</span>
                  </div>
                </div>
              </a>
            ` : ''}

            ${members.map((m, i) => {
              const colors = avatarColors[i % avatarColors.length];
              const initial = m.name.charAt(0).toUpperCase();
              const isEditing = editingId === m.id;

              if (isEditing) {
                return `
                  <div class="member-card" style="flex-direction:column;">
                    <div style="display:flex;align-items:center;gap:var(--sp-md);width:100%;">
                      <div class="member-avatar" style="background:${colors.bg};color:${colors.fg};">${initial}</div>
                      <div style="flex:1;">
                        <div class="title-small" style="color:var(--on-surface-variant);margin-bottom:var(--sp-sm);">Edit Member</div>
                      </div>
                    </div>
                    <div style="display:flex;gap:var(--sp-sm);width:100%;margin-top:var(--sp-sm);">
                      <input type="text" class="text-field" value="${m.name}" id="edit-name-${m.id}" style="flex:2;height:44px;" placeholder="Name">
                      <input type="number" class="text-field" value="${m.age}" id="edit-age-${m.id}" style="flex:1;height:44px;" placeholder="Age">
                    </div>
                    <div style="display:flex;gap:var(--sp-sm);margin-top:var(--sp-sm);justify-content:flex-end;width:100%;">
                      <button class="btn btn-text" onclick="cancelEdit()">Cancel</button>
                      <button class="btn btn-filled" style="height:36px;padding:0 16px;" onclick="saveEdit('${m.id}')">Save</button>
                    </div>
                  </div>
                `;
              }

              return `
                <div class="member-card">
                  <div class="member-avatar" style="background:${colors.bg};color:${colors.fg};">${initial}</div>
                  <div class="member-info">
                    <div style="display:flex;align-items:center;gap:var(--sp-sm);">
                      <span class="member-name">${m.name}</span>
                      <span class="type-badge">${m.type}</span>
                    </div>
                    <div class="member-meta">Age: ${m.age}</div>
                    ${m.health && m.health.length > 0 ? `
                      <div class="member-health">
                        ${m.health.map(h => `<span class="health-chip">${h.replace('_', ' ')}</span>`).join('')}
                      </div>
                    ` : ''}
                  </div>
                  <div class="member-actions">
                    <button class="icon-btn" onclick="startEdit('${m.id}')" title="Edit">&#9998;</button>
                    <button class="icon-btn" onclick="deleteMember('${m.id}')" title="Delete" style="color:var(--error);">&#128465;</button>
                  </div>
                </div>
              `;
            }).join('')}

            <!-- Add Member -->
            <button class="btn btn-outlined" style="width:100%;margin-top:var(--sp-sm);" onclick="addMember()">+ Add Member</button>

          </div>
        </div>
      `;
    }

    function startEdit(id) {
      editingId = id;
      render();
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function saveEdit(id) {
      const name = document.getElementById('edit-name-' + id).value.trim();
      const age = parseInt(document.getElementById('edit-age-' + id).value);
      if (name && age > 0) {
        const member = members.find(m => m.id === id);
        if (member) {
          member.name = name;
          member.age = age;
          setState('family_members', members);
        }
      }
      editingId = null;
      render();
    }

    function deleteMember(id) {
      members = members.filter(m => m.id !== id);
      setState('family_members', members);
      render();
    }

    function addMember() {
      const newId = String(Date.now());
      members.push({ id: newId, name: 'New Member', age: 25, type: 'ADULT', health: [] });
      setState('family_members', members);
      editingId = newId;
      render();
    }

    render();
  </script>
</body>
</html>
