<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Portion Customization</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const members = getHouseholdMembers();

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Portion & Customization', backLink: 'settings-household.html' })}

      <div class="screen-content">
        <div class="content-padding">

          ${members.map((m, i) => `
            <div class="hh-member-card" style="flex-direction:column;align-items:stretch;animation-delay:${i * 0.05}s;">
              <div style="display:flex;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-md);">
                ${renderMemberAvatar(m.name, 44)}
                <div style="flex:1;">
                  <div class="title-small" style="font-weight:600;color:var(--on-surface);">${m.name}</div>
                  ${renderRoleBadge(m.role)}
                </div>
              </div>

              <!-- Portion Size -->
              <div style="margin-bottom:var(--sp-md);">
                <div class="body-small" style="color:var(--on-surface-variant);margin-bottom:var(--sp-xs);">Portion Size</div>
                <div class="segment-control">
                  <button class="segment-btn ${m.portion_size === 'small' ? 'active' : ''}" onclick="selectSegment(this)">Small</button>
                  <button class="segment-btn ${m.portion_size === 'regular' ? 'active' : ''}" onclick="selectSegment(this)">Regular</button>
                  <button class="segment-btn ${m.portion_size === 'large' ? 'active' : ''}" onclick="selectSegment(this)">Large</button>
                </div>
              </div>

              <!-- Active Meal Slots -->
              <div style="margin-bottom:var(--sp-md);">
                <div class="body-small" style="color:var(--on-surface-variant);margin-bottom:var(--sp-xs);">Active Meal Slots</div>
                ${['breakfast', 'lunch', 'dinner', 'snacks'].map(slot => {
                  const active = m.active_slots.includes(slot);
                  return `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;">
                      <span class="body-medium">${slot.charAt(0).toUpperCase() + slot.slice(1)}</span>
                      <button class="toggle ${active ? 'on' : ''}" onclick="this.classList.toggle('on');"></button>
                    </div>
                  `;
                }).join('')}
                ${!m.active_slots.includes('lunch') ? `<div class="body-small" style="color:var(--tertiary);margin-top:2px;">${m.name} eats lunch at school</div>` : ''}
              </div>

              <!-- Nutrition Tracking -->
              <div>
                <div class="body-small" style="color:var(--on-surface-variant);margin-bottom:var(--sp-xs);">Nutrition Tracking</div>
                <div class="segment-control">
                  <button class="segment-btn" onclick="selectSegment(this)">Off</button>
                  <button class="segment-btn active" onclick="selectSegment(this)">Basic</button>
                  <button class="segment-btn" onclick="selectSegment(this)">Detailed</button>
                </div>
              </div>
            </div>
          `).join('')}

          <button class="btn btn-filled" style="width:100%;margin-top:var(--sp-md);">Save Changes</button>
          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;

    function selectSegment(btn) {
      btn.parentElement.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
