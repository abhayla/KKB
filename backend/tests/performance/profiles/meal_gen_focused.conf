# Focused Meal Generation Test — AI endpoint only
# Purpose: Measure meal generation latency and throughput in isolation
# Duration: 5 minutes, 3 concurrent generation users
# Cost: ~15-20 Gemini API calls ($0.04)
# Use: locust -f tests/performance/locustfile.py MealGenHeavyUser --config tests/performance/profiles/meal_gen_focused.conf

locustfile = tests/performance/locustfile.py
headless = true
users = 3
spawn-rate = 1
run-time = 5m
host = http://localhost:8000
html = tests/performance/reports/meal_gen_report.html
csv = tests/performance/reports/meal_gen
