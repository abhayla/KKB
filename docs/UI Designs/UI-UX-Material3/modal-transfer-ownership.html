<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Transfer Ownership</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .transfer-dialog {
      max-width: 320px;
    }
    .transfer-emoji {
      font-size: 48px;
      display: inline-block;
      animation: bounceIn 0.5s ease-out;
    }
    .member-radio-card {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-md);
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-md);
      margin-bottom: var(--sp-sm);
      cursor: pointer;
      transition: all var(--transition-normal);
      background: transparent;
    }
    .member-radio-card:hover {
      background: var(--surface-warm);
    }
    .member-radio-card.selected {
      border-color: var(--primary);
      background: var(--primary-container);
    }
    .member-radio-card .member-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
      transition: transform var(--transition-normal);
    }
    .member-radio-card.selected .member-avatar {
      transform: scale(1.1);
    }
    .member-radio-card .member-details {
      flex: 1;
    }
    .member-radio-card .member-card-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--on-surface);
    }
    .member-radio-card.selected .member-card-name {
      font-weight: 600;
      color: var(--on-primary-container);
    }
    .member-radio-card .member-card-status {
      font-size: 12px;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }
    .member-radio-card .radio-indicator {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--outline);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition-normal);
    }
    .member-radio-card.selected .radio-indicator {
      border-color: var(--primary);
    }
    .radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
      transition: background var(--transition-normal);
    }
    .member-radio-card.selected .radio-dot {
      background: var(--primary);
    }
    .transfer-note {
      background: var(--surface-warm);
      border-radius: var(--radius-sm);
      padding: var(--sp-sm) var(--sp-md);
      margin: var(--sp-md) 0;
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }
    .transfer-note-icon {
      font-size: 14px;
      color: var(--on-surface-variant);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const members = getHouseholdMembers().filter(m => m.user_id && m.role !== 'OWNER');

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="settings-household.html" class="nav-icon">&#8592;</a>
        <span class="title">Household</span>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:200px;"></div>
        </div>
      </div>

      <div class="dialog-overlay">
        <div class="dialog transfer-dialog">
          <div style="text-align:center;margin-bottom:var(--sp-md);">
            <span class="transfer-emoji">&#128081;</span>
          </div>
          <div class="dialog-title" style="text-align:center;">Transfer Ownership</div>
          <p class="body-medium" style="color:var(--on-surface-variant);text-align:center;margin-bottom:var(--sp-lg);">Choose a new owner for this household.</p>

          <!-- Eligible Members -->
          <div id="member-list">
            ${members.map((m, i) => `
              <div class="member-radio-card ${i === 0 ? 'selected' : ''}" onclick="document.querySelectorAll('.member-radio-card').forEach(c => c.classList.remove('selected')); this.classList.add('selected');">
                ${renderMemberAvatar(m.name, 44)}
                <div class="member-details">
                  <div class="member-card-name">${m.name}</div>
                  <div class="member-card-status">App linked</div>
                </div>
                <div class="radio-indicator">
                  <div class="radio-dot"></div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="transfer-note">
            <span class="transfer-note-icon">&#9432;</span>
            <span class="body-small" style="color:var(--on-surface-variant);">You will become a regular Member after transferring.</span>
          </div>

          <div class="dialog-actions" style="justify-content:stretch;margin-top:var(--sp-md);">
            <a href="settings-household.html" class="btn btn-text" style="flex:1;text-decoration:none;">Cancel</a>
            <a href="settings-household.html" class="btn btn-filled" style="flex:1;text-decoration:none;">Transfer</a>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
