<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Notifications</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .notif-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--surface-variant);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .notif-content {
      flex: 1;
      min-width: 0;
    }
    .notif-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--on-surface);
      margin-bottom: 2px;
    }
    .notif-body {
      font-size: 13px;
      color: var(--on-surface-variant);
      line-height: 1.4;
    }
    .notif-time {
      font-size: 11px;
      color: var(--on-surface-variant);
      margin-top: 4px;
    }
    .notif-delete {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--on-surface-variant);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .notif-delete:hover {
      background: var(--error-container);
      color: var(--error);
    }
    .filter-tabs {
      display: flex;
      gap: var(--sp-sm);
      padding: var(--sp-sm) var(--sp-md);
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app">
  </div>

  <script>
    initPage();

    let notifications = JSON.parse(JSON.stringify(MOCK_NOTIFICATIONS));
    let filter = 'all'; // 'all' | 'unread'

    function render() {
      const filtered = filter === 'unread'
        ? notifications.filter(n => !n.read)
        : notifications;

      const app = document.getElementById('app');
      app.innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({
          title: 'Notifications',
          backLink: 'main-home.html',
          actions: '<button class="btn btn-text" style="font-size:12px;" onclick="markAllRead()">Mark all read</button>'
        })}

        <div class="filter-tabs">
          <button class="filter-chip ${filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
          <button class="filter-chip ${filter === 'unread' ? 'active' : ''}" onclick="setFilter('unread')">Unread</button>
        </div>

        <div class="screen-content">
          <div class="content-padding" style="padding-top:0;">
            ${filtered.length === 0 ? `
              <div class="empty-state">
                <div class="empty-icon">&#x1F514;</div>
                <div class="empty-title">All caught up!</div>
                <div class="empty-text">No unread notifications.</div>
              </div>
            ` : ''}
            ${filtered.map(n => `
              <div class="notification-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
                <div class="notif-icon">${n.icon}</div>
                <div class="notif-content">
                  <div class="notif-title">${n.title}</div>
                  <div class="notif-body">${n.body}</div>
                  <div class="notif-time">${n.time}</div>
                </div>
                <button class="notif-delete" onclick="event.stopPropagation(); deleteNotif('${n.id}')">&#x2715;</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function setFilter(f) {
      filter = f;
      render();
    }

    function markRead(id) {
      const n = notifications.find(n => n.id === id);
      if (n) n.read = true;
      render();
    }

    function markAllRead() {
      notifications.forEach(n => n.read = true);
      render();
    }

    function deleteNotif(id) {
      notifications = notifications.filter(n => n.id !== id);
      render();
    }

    render();
  </script>
</body>
</html>
