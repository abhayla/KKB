<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Data &amp; Privacy</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .data-card {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--card-padding);
      margin-bottom: var(--sp-lg);
      transition: all var(--transition-normal);
    }
    .data-card:hover {
      box-shadow: var(--shadow-sm);
    }
    .data-card .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-sm);
    }
    .data-card .card-row:last-child {
      margin-bottom: 0;
    }
    .guest-card {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--card-padding);
      margin-bottom: var(--sp-md);
    }
    .guest-card .info-row {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-md);
    }
    .guest-card .info-icon {
      color: var(--on-surface-variant);
      font-size: 16px;
      flex-shrink: 0;
    }
    .guest-card .guest-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-xs) 0;
      border-top: 1px solid var(--outline-variant);
      padding-top: var(--sp-md);
    }
    .deletion-warning {
      background: var(--error-container);
      border-radius: var(--radius-md);
      padding: var(--sp-md);
      margin-bottom: var(--sp-md);
    }
    .deletion-warning .warning-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--on-error-container);
      margin-bottom: var(--sp-xs);
    }
    .deletion-warning .warning-text {
      font-size: 12px;
      color: var(--on-error-container);
      line-height: 1.5;
    }
    .deletion-card {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--card-padding);
      margin-bottom: var(--sp-md);
    }
    .deletion-card .deletion-label {
      font-size: 12px;
      color: var(--on-surface-variant);
      font-weight: 600;
      margin-bottom: var(--sp-sm);
    }
    .deletion-card .deletion-item {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-xs);
    }
    .deletion-card .deletion-item .icon-delete {
      color: var(--error);
    }
    .deletion-card .deletion-item .icon-keep {
      color: var(--secondary);
    }
    .deletion-card .preserved-section {
      border-top: 1px solid var(--outline-variant);
      padding-top: var(--sp-sm);
      margin-top: var(--sp-sm);
    }
    .btn-delete {
      width: 100%;
      color: var(--error);
      border-color: var(--error);
    }
    .btn-delete:hover {
      background: var(--error-container);
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();
    const isOwner = getHouseholdMembers().some(m => m.role === 'OWNER' && m.user_id === 'user-1');

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Data & Privacy', backLink: 'settings-main.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Your Data -->
          <div class="section-header">
            <span class="section-title">Your Data</span>
          </div>
          <div class="data-card">
            <div class="card-row">
              <div>
                <div class="title-small" style="font-weight:600;color:var(--on-surface);">Export My Data</div>
                <div class="body-small" style="color:var(--on-surface-variant);">Download preferences, meal history, recipes</div>
              </div>
              <button class="btn btn-filled" style="height:36px;padding:0 16px;">Export</button>
            </div>
            <div class="body-small" style="color:var(--on-surface-variant);">Last export: Never</div>
          </div>

          <!-- Guest Data -->
          <div class="section-header">
            <span class="section-title">Guest Data</span>
          </div>
          <div class="guest-card">
            <div class="info-row">
              <span class="info-icon">&#9432;</span>
              <span class="body-small" style="color:var(--on-surface-variant);line-height:1.5;">Guest data is automatically removed when they leave the household.</span>
            </div>
            <div class="guest-entry">
              <div>
                <div class="body-medium" style="font-weight:500;color:var(--on-surface);">Uncle Vijay</div>
                <div class="body-small" style="color:var(--on-surface-variant);">Visited Mar 1-7</div>
              </div>
              <span class="body-small" style="color:var(--secondary);font-weight:500;">Data removed</span>
            </div>
          </div>

          <!-- Account Deletion -->
          <div class="section-header">
            <span class="section-title" style="color:var(--error);">Account Deletion</span>
          </div>

          ${isOwner ? `
            <div class="deletion-warning">
              <div class="warning-title">&#9888; You are the household owner</div>
              <div class="warning-text">Before deleting your account, you must transfer household ownership to another app-linked member.</div>
            </div>
            <a href="modal-transfer-ownership.html" class="btn btn-outlined" style="width:100%;text-decoration:none;margin-bottom:var(--sp-lg);">Transfer Ownership First</a>
          ` : `
            <div class="deletion-card">
              <div class="deletion-label">What gets deleted:</div>
              <div class="deletion-item">
                <span class="icon-delete">&#10005;</span>
                <span class="body-small" style="color:var(--on-surface);">Meal history and preferences</span>
              </div>
              <div class="deletion-item">
                <span class="icon-delete">&#10005;</span>
                <span class="body-small" style="color:var(--on-surface);">Saved recipes and favorites</span>
              </div>
              <div class="deletion-item">
                <span class="icon-delete">&#10005;</span>
                <span class="body-small" style="color:var(--on-surface);">Chat history</span>
              </div>
              <div class="preserved-section">
                <div class="deletion-label">What's preserved:</div>
                <div class="deletion-item">
                  <span class="icon-keep">&#10003;</span>
                  <span class="body-small" style="color:var(--on-surface);">Household plan (other members keep it)</span>
                </div>
                <div class="deletion-item">
                  <span class="icon-keep">&#10003;</span>
                  <span class="body-small" style="color:var(--on-surface);">Other members' data</span>
                </div>
              </div>
            </div>
            <button class="btn btn-outlined btn-delete">Delete My Account</button>
          `}

          <div style="height:var(--sp-xl);"></div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
