name: Bug Report
description: Report a bug or defect in the app
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application is affected?
      options:
        - Android - Home Screen
        - Android - Auth/Onboarding
        - Android - Recipe Detail
        - Android - Grocery
        - Android - Chat
        - Android - Favorites
        - Android - Settings
        - Android - Cooking Mode
        - Android - Stats
        - Backend - API
        - Backend - AI/Claude
        - Backend - Database
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the bug?
      options:
        - Critical - App crashes or data loss
        - High - Major feature broken
        - Medium - Feature partially broken
        - Low - Minor issue or cosmetic
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to...
        2. Tap on...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
  - type: textarea
    id: code-location
    attributes:
      label: Code Location
      description: File path and line numbers if known
      placeholder: "android/app/src/main/.../HomeScreen.kt:323"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Any relevant error messages or stack traces
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, device info, or other relevant details
