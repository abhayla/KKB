<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Achievements</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .summary-card {
      background: linear-gradient(135deg, var(--primary-container), var(--tertiary-container));
      border-radius: var(--radius-md);
      padding: var(--sp-lg);
      margin-bottom: var(--sp-lg);
      text-align: center;
    }
    .summary-card .summary-text {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--on-primary-container);
      margin-bottom: var(--sp-md);
    }
    .summary-card .progress-bar {
      height: 8px;
      border-radius: 4px;
    }
    .achievement-card {
      margin-bottom: var(--sp-sm);
    }
    .achievement-card .achievement-info {
      flex: 1;
      min-width: 0;
    }
    .achievement-card .achievement-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--on-surface);
    }
    .achievement-card .achievement-desc {
      font-size: 12px;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }
    .achievement-card .achievement-date {
      font-size: 11px;
      color: var(--primary);
      margin-top: 4px;
      font-weight: 500;
    }
    .achievement-card.locked .achievement-name,
    .achievement-card.locked .achievement-desc {
      color: var(--on-surface-variant);
    }
    .lock-icon {
      font-size: 16px;
      opacity: 0.5;
    }
    .achievement-progress {
      margin-top: 6px;
    }
    .achievement-progress .progress-bar {
      height: 6px;
      border-radius: 3px;
    }
    .achievement-progress .progress-label {
      font-size: 11px;
      color: var(--on-surface-variant);
      margin-top: 4px;
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app">
  </div>

  <script>
    initPage();

    const achievements = MOCK_ACHIEVEMENTS;
    const unlocked = achievements.filter(a => a.unlocked);
    const locked = achievements.filter(a => !a.unlocked);
    const total = achievements.length;

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({
          title: 'Achievements',
          backLink: 'main-stats.html'
        })}

        <div class="screen-content">
          <div class="content-padding">

            <div class="summary-card">
              <div class="summary-text">${unlocked.length} of ${total} Unlocked</div>
              <div class="progress-bar" style="height:8px;">
                <div class="progress-fill" style="width: ${(unlocked.length / total) * 100}%; height:100%; border-radius:4px;"></div>
              </div>
            </div>

            ${unlocked.length > 0 ? `
              <div class="section-header">
                <span class="section-title">Unlocked</span>
              </div>
              ${unlocked.map(a => `
                <div class="achievement-card">
                  <div class="achievement-icon">${a.emoji}</div>
                  <div class="achievement-info">
                    <div class="achievement-name">${a.name}</div>
                    <div class="achievement-desc">${a.description}</div>
                    <div class="achievement-date">Unlocked: ${a.date}</div>
                  </div>
                </div>
              `).join('')}
            ` : ''}

            ${locked.length > 0 ? `
              <div class="section-header" style="margin-top: var(--sp-md);">
                <span class="section-title">Locked</span>
              </div>
              ${locked.map(a => `
                <div class="achievement-card locked">
                  <div class="achievement-icon"><span class="lock-icon">&#x1F512;</span></div>
                  <div class="achievement-info">
                    <div class="achievement-name">${a.name}</div>
                    <div class="achievement-desc">${a.description}</div>
                    <div class="achievement-progress">
                      <div class="progress-bar" style="height:6px;">
                        <div class="progress-fill" style="width: ${(a.progress / a.total) * 100}%; height:100%; border-radius:3px;"></div>
                      </div>
                      <div class="progress-label">${a.progress} / ${a.total}</div>
                    </div>
                  </div>
                </div>
              `).join('')}
            ` : ''}

          </div>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
