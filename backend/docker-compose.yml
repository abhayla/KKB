version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rasoiai
      POSTGRES_PASSWORD: rasoiai_password
      POSTGRES_DB: rasoiai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rasoiai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional, for future caching)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RasoiAI API
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://rasoiai:rasoiai_password@db:5432/rasoiai
      # Fails loudly if unset — do NOT reintroduce a default here.
      # See .claude/rules/settings-configuration-validation.md (security-critical fields have no defaults).
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in your .env file}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount Firebase credentials if exists
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
