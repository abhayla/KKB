<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Dietary Restrictions</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();

    const allRestrictions = [
      { id: 'jain', label: 'Jain', badge: 'jain', desc: 'No root vegetables, no onion/garlic' },
      { id: 'sattvic', label: 'Sattvic', badge: 'sattvic', desc: 'Pure, clean foods without onion/garlic' },
      { id: 'halal', label: 'Halal', badge: 'halal', desc: 'Halal-certified ingredients only' },
      { id: 'vegan', label: 'Vegan', badge: 'vegan', desc: 'No animal products' },
      { id: 'no_gluten', label: 'No Gluten', badge: 'fasting', desc: 'Gluten-free meals only' }
    ];

    // Household restrictions (shared meals)
    let householdSelected = getState('household_dietary_restrictions', MOCK_HOUSEHOLD_PREFERENCES.dietary_restrictions);
    // Personal restrictions (breakfast & snacks)
    let personalSelected = getState('personal_dietary_restrictions', MOCK_PERSONAL_PREFERENCES.dietary_restrictions);
    // Solo user restrictions (legacy key, used when no household)
    let selected = getState('dietary_restrictions', SHARMA_DEFAULTS.dietary_restrictions);

    function renderRestrictionList(items, selectedList, toggleFn, disabled) {
      const disabledStyle = disabled ? 'opacity: 0.6; pointer-events: none;' : '';
      return items.map(r => {
        const isChecked = selectedList.includes(r.id);
        return `
          <div class="list-item" onclick="${disabled ? '' : toggleFn + "('" + r.id + "')"}" style="margin-bottom:var(--sp-xs);${disabledStyle}">
            <div class="checkbox ${isChecked ? 'checked' : ''}" id="cb-${toggleFn}-${r.id}">${isChecked ? '&#10003;' : ''}</div>
            <div class="list-content">
              <div style="display:flex;align-items:center;gap:var(--sp-sm);">
                <span class="list-title">${r.label}</span>
                <span class="dietary-badge ${r.badge}">${r.label.toUpperCase()}</span>
              </div>
              <div class="list-subtitle">${r.desc}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function render() {
      const solo = isSoloUser();

      let contentHtml = '';

      if (!solo) {
        const ownerCanEdit = isOwner();
        const scope = getScopeView('settings_dietary');

        if (scope === 'family') {
          contentHtml += `
            ${!ownerCanEdit ? '<div style="padding:var(--sp-sm) var(--sp-md);background:var(--secondary-container);border-radius:var(--radius-sm);margin-bottom:var(--sp-md);font-size:13px;color:var(--on-secondary-container);">Only the household owner can edit these restrictions.</div>' : ''}
            <p class="body-medium" style="color:var(--on-surface-variant);margin-bottom:var(--sp-lg);">
              Dietary restrictions for shared meals (lunch &amp; dinner). Applied during family meal plan generation.
            </p>
            ${renderRestrictionList(allRestrictions, householdSelected, 'toggleHousehold', !ownerCanEdit)}
          `;
        } else {
          contentHtml += `
            <p class="body-medium" style="color:var(--on-surface-variant);margin-bottom:var(--sp-lg);">
              Your personal dietary restrictions for breakfast &amp; snacks.
            </p>
            ${renderRestrictionList(allRestrictions, personalSelected, 'togglePersonal', false)}
          `;
        }
      } else {
        // --- Solo user: single section ---
        contentHtml += `
          <p class="body-medium" style="color:var(--on-surface-variant);margin-bottom:var(--sp-lg);">
            Select any dietary restrictions for your family. These will be strictly enforced during meal plan generation.
          </p>
          ${renderRestrictionList(allRestrictions, selected, 'toggleRestriction', false)}
        `;
      }

      document.getElementById('app').innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({ title: 'Dietary Restrictions', backLink: 'settings-main.html' })}
        ${!isSoloUser() ? renderScopeToggle('settings_dietary', 'Household', 'My Preferences') : ''}

        <div class="screen-content">
          <div class="content-padding">
            ${contentHtml}
          </div>
        </div>

        <!-- Save Button -->
        <div style="padding:var(--sp-md);flex-shrink:0;">
          <button class="btn btn-filled" style="width:100%;" onclick="saveRestrictions()">Save</button>
        </div>
      `;
    }

    function toggleHousehold(id) {
      const idx = householdSelected.indexOf(id);
      if (idx >= 0) {
        householdSelected.splice(idx, 1);
      } else {
        householdSelected.push(id);
      }
      render();
    }

    function togglePersonal(id) {
      const idx = personalSelected.indexOf(id);
      if (idx >= 0) {
        personalSelected.splice(idx, 1);
      } else {
        personalSelected.push(id);
      }
      render();
    }

    function toggleRestriction(id) {
      const idx = selected.indexOf(id);
      if (idx >= 0) {
        selected.splice(idx, 1);
      } else {
        selected.push(id);
      }
      render();
    }

    function saveRestrictions() {
      if (!isSoloUser()) {
        setState('household_dietary_restrictions', householdSelected);
        setState('personal_dietary_restrictions', personalSelected);
      } else {
        setState('dietary_restrictions', selected);
      }
      window.location.href = 'settings-main.html';
    }

    render();
  </script>
</body>
</html>
