<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Disliked Ingredients</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();

    const chipStyle = 'display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--radius-full);background:var(--surface-variant);font-size:14px;margin:0 var(--sp-xs) var(--sp-xs) 0;';
    const suggestions = ['Lauki', 'Turai', 'Tinda', 'Arbi', 'Methi', 'Parwal'];

    // Initialize state from mock data
    let household_dislikes = getState('household_dislikes', MOCK_HOUSEHOLD_PREFERENCES.dislikes).slice();
    let personal_dislikes = getState('personal_dislikes', MOCK_PERSONAL_PREFERENCES.dislikes).slice();

    function renderChip(name, removable, onRemoveFn) {
      if (removable) {
        return `<span style="${chipStyle}cursor:pointer;" onclick="${onRemoveFn}('${name}')">${name}<span style="margin-left:2px;font-size:12px;opacity:0.7;">&#10005;</span></span>`;
      }
      return `<span style="${chipStyle}">${name}</span>`;
    }

    function renderAddInput(id, onAddFn) {
      return `<div style="display:flex;gap:var(--sp-sm);margin-top:var(--sp-sm);">
        <input type="text" class="text-field" id="${id}" placeholder="Add ingredient..." style="flex:1;height:44px;">
        <button class="btn btn-filled" style="height:44px;padding:0 16px;" onclick="${onAddFn}()">Add</button>
      </div>`;
    }

    function renderDislikeChips(items, removable, removeFn) {
      if (items.length === 0) {
        return '<span class="body-medium" style="color:var(--on-surface-variant);">No disliked ingredients</span>';
      }
      return items.map(d => renderChip(d, removable, removeFn)).join('');
    }

    function render() {
      const solo = isSoloUser();
      const owner = isOwner();

      let content = '';

      if (!solo) {
        const showFamily = getScopeView('settings_dislikes') === 'family';

        if (showFamily) {
          // Household section
          const hhReadonly = !owner;
          content += `<p class="body-small" style="color:var(--on-surface-variant);margin:0 0 var(--sp-md) 0;">Ingredients avoided in shared meals for all family members.</p>`;
          if (hhReadonly) {
            content += '<div style="padding:var(--sp-sm) var(--sp-md);background:var(--secondary-container);border-radius:var(--radius-sm);margin-bottom:var(--sp-md);font-size:13px;color:var(--on-secondary-container);">Only the household owner can edit household dislikes.</div>';
          }
          const hhSectionStyle = hhReadonly ? 'opacity:0.6;pointer-events:none;' : '';
          content += `<div style="${hhSectionStyle}">`;
          content += `<div style="flex-wrap:wrap;display:flex;margin-bottom:var(--sp-sm);">`;
          content += renderDislikeChips(household_dislikes, owner, 'removeHouseholdDislike');
          content += `</div>`;
          if (owner) {
            content += renderAddInput('hh-input', 'addHouseholdFromInput');
          }
          content += `</div>`;
        } else {
          // Personal section
          content += `<p class="body-small" style="color:var(--on-surface-variant);margin:0 0 var(--sp-md) 0;">Ingredients you personally want to avoid in your meals.</p>`;
          content += `<div style="flex-wrap:wrap;display:flex;margin-bottom:var(--sp-sm);">`;
          content += renderDislikeChips(personal_dislikes, true, 'removePersonalDislike');
          content += `</div>`;
          content += renderAddInput('personal-input', 'addPersonalFromInput');
        }
      } else {
        // --- Solo User: Personal only ---
        content += `<div class="section-header">
          <span class="section-title">Disliked Ingredients</span>
          <span class="body-small" style="color:var(--on-surface-variant);">${personal_dislikes.length} items</span>
        </div>`;
        content += `<p class="body-small" style="color:var(--on-surface-variant);margin:0 0 var(--sp-md) 0;">Ingredients you personally want to avoid in your meals.</p>`;
        content += `<div style="flex-wrap:wrap;display:flex;margin-bottom:var(--sp-sm);">`;
        content += renderDislikeChips(personal_dislikes, true, 'removePersonalDislike');
        content += `</div>`;
        content += renderAddInput('personal-input', 'addPersonalFromInput');

        // --- Suggestions (solo only, preserving original behavior) ---
        const remaining = suggestions.filter(s => !personal_dislikes.includes(s));
        content += `<div class="section-header" style="margin-top:var(--sp-lg);">
          <span class="section-title">Suggestions</span>
        </div>`;
        content += `<div class="chip-group">`;
        content += remaining.length > 0
          ? remaining.map(s => `<span class="chip" onclick="addPersonalDislike('${s}')">+ ${s}</span>`).join('')
          : '<span class="body-small" style="color:var(--on-surface-variant);">All suggestions added</span>';
        content += `</div>`;
      }

      document.getElementById('app').innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({ title: 'Disliked Ingredients', backLink: 'settings-main.html' })}
        ${!solo ? renderScopeToggle('settings_dislikes', 'Household', 'My Preferences') : ''}
        <div class="screen-content">
          <div class="content-padding">
            ${content}
          </div>
        </div>
      `;
    }

    // --- Household dislike functions ---
    function addHouseholdDislike(name) {
      if (name && !household_dislikes.includes(name)) {
        household_dislikes.push(name);
        setState('household_dislikes', household_dislikes);
        render();
      }
    }

    function removeHouseholdDislike(name) {
      household_dislikes = household_dislikes.filter(d => d !== name);
      setState('household_dislikes', household_dislikes);
      render();
    }

    function addHouseholdFromInput() {
      const input = document.getElementById('hh-input');
      const val = input.value.trim();
      addHouseholdDislike(val);
    }

    // --- Personal dislike functions ---
    function addPersonalDislike(name) {
      if (name && !personal_dislikes.includes(name)) {
        personal_dislikes.push(name);
        setState('personal_dislikes', personal_dislikes);
        render();
      }
    }

    function removePersonalDislike(name) {
      personal_dislikes = personal_dislikes.filter(d => d !== name);
      setState('personal_dislikes', personal_dislikes);
      render();
    }

    function addPersonalFromInput() {
      const input = document.getElementById('personal-input');
      const val = input.value.trim();
      addPersonalDislike(val);
    }

    render();
  </script>
</body>
</html>
