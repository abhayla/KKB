<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Splash</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .splash-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #FF6838 0%, #FF8A65 40%, #FFDBD0 100%);
      padding: var(--sp-lg);
      text-align: center;
      gap: var(--sp-lg);
    }
    .splash-logo {
      font-family: 'Poppins', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
      line-height: 1.1;
    }
    .splash-hindi {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      margin-top: -4px;
    }
    .splash-tagline {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      max-width: 260px;
    }
    .splash-spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-md);
    }
    .splash-spinner-wrap .progress-circular {
      border-color: rgba(255,255,255,0.3);
      border-top-color: white;
      width: 36px;
      height: 36px;
    }
    .splash-bottom {
      padding: var(--sp-lg) var(--sp-lg) var(--sp-xxl);
      background: linear-gradient(to top, #FFDBD0 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-sm);
    }
    .splash-bottom .btn-filled {
      background: white;
      color: var(--primary);
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(255,104,56,0.25);
    }
    .splash-bottom .btn-filled:hover {
      box-shadow: 0 6px 24px rgba(255,104,56,0.35);
    }
  </style>
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-status-bar" style="background:transparent; color:white;">
      <span class="time">9:41</span>
      <span class="icons">&#x1F4F6; &#x1F50B;</span>
    </div>

    <div class="splash-body">
      <div>
        <div class="splash-logo">RasoiAI</div>
        <div class="splash-hindi">&#x0930;&#x0938;&#x094B;&#x0908; AI</div>
      </div>

      <div class="splash-spinner-wrap">
        <div class="progress-circular"></div>
      </div>

      <p class="splash-tagline">Your AI-powered Indian kitchen</p>
    </div>

    <div class="splash-bottom">
      <a href="auth-phone.html" class="btn-filled btn-large w-full" style="text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">
        Get Started
      </a>
    </div>
  </div>

  <script>initPage();</script>
</body>
</html>
