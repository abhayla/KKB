<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Join Household</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();

    document.getElementById('app').innerHTML = `
      ${renderStatusBar()}
      ${renderTopBar({ title: 'Join Household', backLink: 'settings-household.html' })}

      <div class="screen-content">
        <div class="content-padding">

          <!-- Illustration -->
          <div style="text-align:center;padding:var(--sp-xl) 0 var(--sp-lg);">
            <div style="font-size:72px;">&#127968;&#128273;</div>
            <div class="title-large" style="color:var(--on-surface);margin-top:var(--sp-md);">Join a Household</div>
            <div class="body-medium" style="color:var(--on-surface-variant);margin-top:var(--sp-sm);line-height:1.5;">Enter the 8-character invite code shared by the household owner.</div>
          </div>

          <!-- Invite Code Input -->
          <div style="margin-bottom:var(--sp-xl);">
            <div class="label-large" style="margin-bottom:var(--sp-sm);color:var(--on-surface-variant);">Invite Code</div>
            <input type="text" class="text-field" id="invite-input" placeholder="A1B2C3D4" maxlength="8" style="height:56px;font-size:24px;text-align:center;letter-spacing:6px;text-transform:uppercase;font-weight:700;font-family:monospace;">
          </div>

          <!-- Role Selection -->
          <div style="margin-bottom:var(--sp-xl);">
            <div class="label-large" style="margin-bottom:var(--sp-sm);color:var(--on-surface-variant);">Join as</div>
            <div style="display:flex;gap:var(--sp-md);">
              <div class="radio-card selected" id="role-member" onclick="selectRole('member')">
                <div style="font-size:28px;margin-bottom:var(--sp-xs);">&#128101;</div>
                <div class="title-small" style="font-weight:600;">Member</div>
                <div class="body-small" style="color:var(--on-surface-variant);margin-top:2px;">Permanent family member</div>
              </div>
              <div class="radio-card" id="role-guest" onclick="selectRole('guest')">
                <div style="font-size:28px;margin-bottom:var(--sp-xs);">&#127890;</div>
                <div class="title-small" style="font-weight:600;">Guest</div>
                <div class="body-small" style="color:var(--on-surface-variant);margin-top:2px;">Temporary visitor</div>
              </div>
            </div>
          </div>

          <!-- Guest Duration (hidden by default) -->
          <div id="guest-dates" style="display:none;margin-bottom:var(--sp-xl);">
            <div class="label-large" style="margin-bottom:var(--sp-sm);color:var(--on-surface-variant);">Guest Duration</div>
            <div style="display:flex;gap:var(--sp-md);">
              <div style="flex:1;">
                <div class="body-small" style="color:var(--on-surface-variant);margin-bottom:4px;">Arrival</div>
                <input type="date" class="text-field" style="height:44px;font-size:14px;" value="2026-03-07">
              </div>
              <div style="flex:1;">
                <div class="body-small" style="color:var(--on-surface-variant);margin-bottom:4px;">Departure</div>
                <input type="date" class="text-field" style="height:44px;font-size:14px;" value="2026-03-14">
              </div>
            </div>
            <div class="body-small" style="color:var(--on-surface-variant);margin-top:var(--sp-sm);">Guest data is auto-removed after departure.</div>
          </div>

          <!-- Join Button -->
          <a href="modal-join-confirmation.html" class="btn btn-filled" style="width:100%;text-decoration:none;">Join Household</a>

        </div>
      </div>
    `;

    function selectRole(role) {
      document.getElementById('role-member').classList.toggle('selected', role === 'member');
      document.getElementById('role-guest').classList.toggle('selected', role === 'guest');
      document.getElementById('guest-dates').style.display = role === 'guest' ? 'block' : 'none';
    }
  </script>
</body>
</html>
