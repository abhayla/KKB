<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Delete Rule</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .delete-dialog {
      max-width: 300px;
    }
    .delete-icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--error-container);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: bounceIn 0.5s ease-out;
    }
    .delete-item-name {
      color: var(--primary);
      font-weight: 600;
      background: var(--primary-container);
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      display: inline;
    }
    .delete-description {
      color: var(--on-surface-variant);
      text-align: center;
      line-height: 1.6;
      margin-bottom: var(--sp-sm);
    }
    .delete-warning-hint {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      background: var(--surface-warm);
      border-radius: var(--radius-sm);
      padding: var(--sp-sm) var(--sp-md);
      margin-bottom: var(--sp-lg);
    }
    .delete-warning-hint span.hint-icon {
      font-size: 16px;
      color: var(--on-surface-variant);
      flex-shrink: 0;
    }
    .btn-delete {
      background: var(--error) !important;
      color: var(--on-error) !important;
      box-shadow: 0 2px 8px rgba(186, 26, 26, 0.25);
    }
    .btn-delete:hover {
      box-shadow: 0 4px 16px rgba(186, 26, 26, 0.35) !important;
      filter: brightness(1.08);
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const app = document.getElementById('app');
    app.innerHTML = `
      ${renderStatusBar()}

      <!-- Dimmed parent preview -->
      <div class="top-app-bar" style="opacity:0.3;">
        <a href="feature-recipe-rules.html" class="nav-icon">&#8592;</a>
        <span class="title">Recipe Rules</span>
      </div>
      <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
        <div class="content-padding">
          <div style="height:48px;background:var(--surface-variant);border-radius:var(--radius-md);margin:var(--sp-sm) 0;"></div>
          <div style="height:64px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
          <div style="height:64px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
          <div style="height:64px;background:var(--surface);border-radius:var(--radius-md);margin:var(--sp-sm) 0;box-shadow:var(--shadow-sm);"></div>
        </div>
      </div>

      <!-- Dialog Overlay -->
      <div class="dialog-overlay">
        <div class="dialog delete-dialog">
          <!-- Warning icon -->
          <div style="text-align:center;margin-bottom:var(--sp-md);">
            <div class="delete-icon-circle">&#128465;</div>
          </div>

          <div class="dialog-title" style="text-align:center;">Delete Rule?</div>

          <p class="body-medium delete-description">
            Are you sure you want to delete the rule <span class="delete-item-name">Chai - Daily</span>?
          </p>

          <div class="delete-warning-hint">
            <span class="hint-icon">&#9432;</span>
            <span class="body-small" style="color:var(--on-surface-variant);">This action cannot be undone. The rule will be permanently removed.</span>
          </div>

          <!-- Actions -->
          <div class="dialog-actions" style="justify-content:stretch;">
            <a href="feature-recipe-rules.html" class="btn btn-text" style="flex:1;text-decoration:none;">Cancel</a>
            <a href="feature-recipe-rules.html" class="btn btn-filled btn-delete" style="flex:1;text-decoration:none;">Delete</a>
          </div>
        </div>
      </div>
    `;
  </script>
</body>
</html>
