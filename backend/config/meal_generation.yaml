  "east:paratha": ["chai", "curry", "sabzi"]
  "east:sabzi": ["rice", "roti", "luchi"]
  "east:curry": ["rice", "roti", "luchi"]
  "east:biryani": ["raita", "salad"]
  "east:chai": ["singara", "snack", "mishti"]
