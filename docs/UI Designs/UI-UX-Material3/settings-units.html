<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Units</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .unit-option {
      display: flex;
      align-items: center;
      gap: var(--sp-md);
      padding: var(--sp-md) var(--sp-sm);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .unit-option:hover {
      background: color-mix(in srgb, var(--surface-warm) 60%, var(--primary-container));
    }
    .unit-option + .unit-option {
      border-top: 1px solid var(--outline-variant);
    }
    .unit-option-icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .unit-option-info {
      flex: 1;
      min-width: 0;
    }
    .unit-option-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--on-surface);
    }
    .unit-option-desc {
      font-size: 12px;
      color: var(--on-surface-variant);
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="phone-frame" id="app"></div>

  <script>
    initPage();

    let units = getState('units_config', {
      volume: 'metric',
      weight: 'metric',
      temperature: 'celsius'
    });

    const volumeOptions = [
      { id: 'metric', label: 'Metric', desc: 'Millilitres & Litres', icon: '&#129516;' },
      { id: 'us', label: 'US Customary', desc: 'Cups & Fluid Ounces', icon: '&#129371;' },
      { id: 'indian', label: 'Indian Traditional', desc: 'Katori & Glass', icon: '&#127861;' }
    ];

    const weightOptions = [
      { id: 'metric', label: 'Metric', desc: 'Grams & Kilograms', icon: '&#9878;' },
      { id: 'us', label: 'US Customary', desc: 'Ounces & Pounds', icon: '&#127991;' }
    ];

    const tempOptions = [
      { id: 'celsius', label: 'Celsius', desc: 'Used in most countries', icon: '&#127777;' },
      { id: 'fahrenheit', label: 'Fahrenheit', desc: 'Used in the US', icon: '&#128293;' }
    ];

    function renderUnitGroup(options, category) {
      return options.map(o => `
        <div class="unit-option" onclick="setUnit('${category}', '${o.id}')">
          <div class="radio ${units[category] === o.id ? 'selected' : ''}"></div>
          <div class="unit-option-icon">${o.icon}</div>
          <div class="unit-option-info">
            <div class="unit-option-label">${o.label}</div>
            <div class="unit-option-desc">${o.desc}</div>
          </div>
        </div>
      `).join('');
    }

    function render() {
      document.getElementById('app').innerHTML = `
        ${renderStatusBar()}
        ${renderTopBar({ title: 'Units', backLink: 'settings-main.html' })}

        <div class="screen-content">
          <div class="content-padding stagger-list">

            <!-- Volume -->
            <div class="section-header-label">Volume</div>
            <div class="card-filled" style="margin-bottom:var(--sp-lg);">
              ${renderUnitGroup(volumeOptions, 'volume')}
            </div>

            <!-- Weight -->
            <div class="section-header-label">Weight</div>
            <div class="card-filled" style="margin-bottom:var(--sp-lg);">
              ${renderUnitGroup(weightOptions, 'weight')}
            </div>

            <!-- Temperature -->
            <div class="section-header-label">Temperature</div>
            <div class="card-filled" style="margin-bottom:var(--sp-lg);">
              ${renderUnitGroup(tempOptions, 'temperature')}
            </div>

          </div>
        </div>

        <!-- Save Button -->
        <div style="padding:var(--sp-md);flex-shrink:0;">
          <button class="btn btn-filled btn-large" style="width:100%;" onclick="saveUnits()">Save</button>
        </div>
      `;
    }

    function setUnit(category, value) {
      units[category] = value;
      render();
    }

    function saveUnits() {
      setState('units_config', units);
      window.location.href = 'settings-main.html';
    }

    render();
  </script>
</body>
</html>
