<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasoiAI - Items Per Meal</title>
  <link rel="stylesheet" href="shared.css">
  <script src="shared.js"></script>
  <style>
    .items-dialog {
      max-width: 280px;
      text-align: center;
    }
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-lg);
      margin-bottom: var(--sp-lg);
    }
    .counter-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--outline-variant);
      background: var(--surface);
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-normal);
      color: var(--on-surface);
    }
    .counter-btn:hover:not(.disabled) {
      border-color: var(--primary);
      background: var(--primary-container);
      transform: scale(1.08);
    }
    .counter-btn:active:not(.disabled) {
      transform: scale(0.92);
    }
    .counter-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }
    .counter-display {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-lg);
      background: var(--primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-sm);
    }
    .counter-value {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--on-primary-container);
    }
    .dot-indicators {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: var(--sp-lg);
    }
    .dot-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: all var(--transition-normal);
    }
    .dot-indicator.active {
      background: var(--primary);
      transform: scale(1.2);
    }
    .dot-indicator.inactive {
      background: var(--outline-variant);
    }
    .items-description {
      background: var(--surface-warm);
      border-radius: var(--radius-sm);
      padding: var(--sp-sm) var(--sp-md);
      margin-bottom: var(--sp-md);
    }
    .items-description-text {
      font-size: 13px;
      color: var(--on-surface-variant);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="phone-frame bottom-sheet-page" id="app"></div>

  <script>
    initPage();
    const app = document.getElementById('app');

    let itemCount = getState('items_per_meal', 2);

    function render() {
      app.innerHTML = `
        ${renderStatusBar()}

        <!-- Dimmed parent preview -->
        <div class="top-app-bar" style="opacity:0.3;">
          <a href="settings-main.html" class="nav-icon">&#8592;</a>
          <span class="title">Settings</span>
        </div>
        <div class="screen-content" style="opacity:0.15;filter:blur(2px);pointer-events:none;">
          <div class="content-padding">
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
            <div style="height:56px;background:var(--surface);border-radius:var(--radius-sm);margin:var(--sp-xs) 0;box-shadow:var(--shadow-sm);"></div>
          </div>
        </div>

        <!-- Dialog Overlay -->
        <div class="dialog-overlay">
          <div class="dialog items-dialog">
            <div class="dialog-title">Items Per Meal</div>

            <p class="body-medium" style="color:var(--on-surface-variant);margin-bottom:var(--sp-lg);">
              Number of recipe items shown per meal slot
            </p>

            <!-- Number Selector -->
            <div class="counter-row">
              <button class="counter-btn ${itemCount <= 1 ? 'disabled' : ''}" onclick="if(itemCount>1){itemCount--;render();}">&#8722;</button>

              <div class="counter-display">
                <span class="counter-value">${itemCount}</span>
              </div>

              <button class="counter-btn ${itemCount >= 4 ? 'disabled' : ''}" onclick="if(itemCount<4){itemCount++;render();}">+</button>
            </div>

            <!-- Dot indicators -->
            <div class="dot-indicators">
              ${Array.from({length: 4}, (_, i) => `
                <div class="dot-indicator ${i < itemCount ? 'active' : 'inactive'}"></div>
              `).join('')}
            </div>

            <!-- Description -->
            <div class="items-description">
              <div class="items-description-text">
                ${itemCount === 1 ? 'Single item per slot (e.g., just Dal Fry)' :
                  itemCount === 2 ? 'Paired items (e.g., Dal Fry + Jeera Rice)' :
                  itemCount === 3 ? 'Triple combo (e.g., Dal + Rice + Raita)' :
                  'Full thali style (e.g., Dal + Rice + Sabzi + Roti)'}
              </div>
            </div>

            <div class="dialog-actions" style="justify-content:center;">
              <a href="settings-main.html" class="btn btn-text" style="text-decoration:none;" onclick="return true;">Cancel</a>
              <a href="settings-main.html" class="btn btn-filled" style="text-decoration:none;" onclick="setState('items_per_meal', ${itemCount});return true;">Save</a>
            </div>
          </div>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
