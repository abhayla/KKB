# Stress Test — find the breaking point
# Purpose: Identify max concurrent users before degradation
# Duration: 15 minutes, ramp to 50 users
# Cost: ~25-40 Gemini API calls ($0.08)
# Watch for: response time degradation, error rate increase, 504 timeouts

locustfile = tests/performance/locustfile.py
headless = true
users = 50
spawn-rate = 2
run-time = 15m
host = http://localhost:8000
html = tests/performance/reports/stress_report.html
csv = tests/performance/reports/stress
